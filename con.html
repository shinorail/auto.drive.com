<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>館浜電鉄 操作盤</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --text: #fff; --accent: #ffcc00; --danger: #ff3b30; --success: #28a745; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 160px; user-select: none; }
        header { position: sticky; top: 0; background: #000; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #conn-tag { font-size: 10px; padding: 4px 10px; border-radius: 20px; background: var(--danger); }
        #conn-tag.on { background: var(--success); }
        .type-nav { display: grid; grid-template-columns: repeat(5, 1fr); }
        .t-btn { border: none; padding: 15px 0; font-size: 10px; font-weight: bold; color: #fff; opacity: 0.3; }
        .t-btn.active { opacity: 1; border-bottom: 4px solid #fff; }
        .t-local { background: #666; } .t-semi { background: #007aff; } .t-express { background: #ff9500; } .t-rapid { background: #af52de; } .t-limited { background: #ff3b30; }
        .row { display: flex; align-items: center; min-height: 65px; margin: 5px; background: var(--panel); border-radius: 8px; border-left: 10px solid #444; }
        .row.stop { border-left-color: var(--accent); }
        .row.done { opacity: 0.2; transform: scale(0.96); }
        .st-name { font-size: 20px; font-weight: bold; margin-left: 15px; }
        .tools { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px 0; border-top: 1px solid #333; }
        .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 0 10px 10px; }
        .tool-btn { background: #333; border: none; color: #fff; padding: 10px 0; border-radius: 5px; font-size: 10px; }
        .mic-btn { width: 70px; height: 70px; border-radius: 50%; background: #222; border: 4px solid #444; color: #fff; font-weight: bold; margin: 0 auto; display: block; }
        .mic-btn.active { background: var(--danger); box-shadow: 0 0 15px var(--danger); }
    </style>
</head>
<body onload="init()">
    <header>
        <div id="clock">00:00:00</div>
        <div id="conn-tag">接続中...</div>
    </header>
    <nav class="type-nav" id="type-nav"></nav>
    <div id="st-list"></div>
    <div class="tools">
        <div class="tool-grid">
            <button class="tool-btn" onclick="sendCmd('⚠️ ドアが閉まります')">ドア閉</button>
            <button class="tool-btn" onclick="sendCmd('🎵 発車メロディ')">発メロ</button>
            <button class="tool-btn" onclick="location.reload()">再読込</button>
            <button class="tool-btn" style="background:var(--danger)" ontouchstart="playBz()" ontouchend="stopBz()">非常</button>
        </div>
        <button id="mic-btn" class="mic-btn" ontouchstart="micOn()" ontouchend="micOff()">🎤 放送</button>
    </div>

    <script>
        const stations = [
            { n: "赤山町", s: [1,1,1,1,1] }, { n: "西赤山", s: [1,1,1,0,0] }, { n: "奥峯口", s: [1,1,1,0,0] },
            { n: "日野森", s: [1,1,1,1,0] }, { n: "高見沢", s: [1,1,1,0,0] }, { n: "水越", s: [1,1,1,1,0] },
            { n: "藤江", s: [1,1,1,1,0] }, { n: "大道寺", s: [1,1,1,1,1] }, { n: "江ノ原", s: [1,1,1,0,0] },
            { n: "新野崎", s: [1,1,1,1,0] }, { n: "新井川", s: [1,0,0,0,0] }, { n: "羽衣橋", s: [1,0,0,0,0] },
            { n: "浜園", s: [1,1,0,0,0] }, { n: "津崎", s: [1,0,0,0,0] }, { n: "虹ケ浜", s: [1,0,0,0,0] },
            { n: "海岸公園", s: [1,0,0,0,0] }, { n: "河原崎", s: [1,0,0,0,0] }, { n: "駒野", s: [1,1,0,0,0] },
            { n: "館浜", s: [1,1,1,1,1] }
        ];
        const types = [{n:'普通',id:'local'},{n:'準急',id:'semi'},{n:'急行',id:'express'},{n:'快急',id:'rapid'},{n:'特急',id:'limited'}];
        let peer, conn, call, curType = 0;

        function init() {
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP',{hour12:false}); }, 1000);
            renderNav(); renderList();
            const targetID = new URLSearchParams(window.location.search).get('id');
            peer = new Peer();
            peer.on('open', () => {
                if(targetID) {
                    conn = peer.connect(targetID);
                    conn.on('open', () => {
                        document.getElementById('conn-tag').innerText = "接続済";
                        document.getElementById('conn-tag').classList.add('on');
                    });
                }
            });
        }

        function renderNav() {
            const nav = document.getElementById('type-nav');
            types.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = `t-btn t-${t.id} ${i===0?'active':''}`;
                b.innerText = t.n;
                b.onclick = () => { curType = i; document.querySelectorAll('.t-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); renderList(); };
                nav.appendChild(b);
            });
        }

        function renderList() {
            const list = document.getElementById('st-list');
            list.innerHTML = '';
            stations.forEach(st => {
                const isStop = st.s[curType];
                const div = document.createElement('div');
                div.className = `row ${isStop ? 'stop' : ''}`;
                div.innerHTML = `<div style="width:40px;text-align:center;font-size:10px;">${isStop?'停車':''}</div><div class="st-name">${st.n}</div>`;
                div.onclick = () => { if(!div.classList.toggle('done') && conn) conn.send({type:'station', val:st.n}); };
                list.appendChild(div);
            });
        }

        async function micOn() {
            document.getElementById('mic-btn').classList.add('active');
            const targetID = new URLSearchParams(window.location.search).get('id');
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            call = peer.call(targetID, stream);
        }
        function micOff() { document.getElementById('mic-btn').classList.remove('active'); if(call) call.close(); }
        function sendCmd(v) { if(conn) conn.send({type:'cmd', val:v}); }

        let ac = new AudioContext(), osc;
        function playBz() { osc=ac.createOscillator(); osc.type='square'; osc.connect(ac.destination); osc.start(); }
        function stopBz() { if(osc) osc.stop(); }
    </script>
</body>
</html>
