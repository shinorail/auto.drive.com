<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指令コンソール V8</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 10px; padding-bottom: 240px; }
        .label { font-size: 11px; color: #ffcc00; margin: 15px 0 6px; font-weight: bold; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { background: #333; border: none; color: #fff; padding: 12px 2px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        button.active { background: #ffcc00; color: #000; }
        .open-btn { background: #e67e22; height: 50px; }
        .close-btn { background: #2980b9; height: 50px; }
        .st-btn { width: 100%; text-align: left; padding: 16px; margin-bottom: 8px; background: #222; border-left: 10px solid #444; border-radius: 4px; font-size: 16px; color: #fff; }
        .emergency-btn { background: #c0392b; height: 60px; font-size: 14px; grid-column: span 3; margin-top: 10px; }
        #mic-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #222; padding: 15px 0; border-top: 2px solid #444; }
        #mic-btn { width: 90%; height: 80px; display: block; margin: 0 auto; background: #ff3b30; border: none; color: #fff; font-size: 20px; font-weight: bold; border-radius: 15px; }
    </style>
</head>
<body onload="init()">
    <div id="status" style="text-align:center; font-size:12px; padding:6px; background:#333;">通信準備中...</div>

    <div class="label">🚨 指令業務</div>
    <div class="grid">
        <button class="emergency-btn" id="sos-btn" onclick="toggleSOS()">防護無線発報（緊急停止）</button>
        <button onclick="sendTicker('【運行指令】 1024列車、車両点検のため最寄りの駅で待機せよ。')">指令受領1</button>
        <button onclick="sendTicker('【運行指令】 全列車、防護無線を受信したため緊急停止してください。')">指令受領2</button>
        <button onclick="sendTicker('現在、指令所と連絡を試みています。しばらくお待ちください。')">連絡中</button>
    </div>

    <div class="label">1. 種別</div>
    <div id="type-grid" class="grid"></div>

    <div class="label">2. 運行テロップ</div>
    <div class="grid">
        <button onclick="sendTicker('平常通り運転しています。')">平常</button>
        <button onclick="sendTicker('車両点検を行っているため、停車しております。')" style="color:#e74c3c">点検中</button>
        <button onclick="sendTicker('信号待ちのため、しばらく停車いたします。')">信号待ち</button>
        <button onclick="sendTicker('踏切内の安全確認を行っています。')">踏切確認</button>
        <button onclick="sendTicker('大雨の影響で、ダイヤに乱れが出ています。')">大雨</button>
        <button onclick="sendTicker('接続待ちのため、発車までお待ちください。')">接続待ち</button>
    </div>

    <div class="label">3. ドア・設備</div>
    <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <button id="cut-switch" onclick="toggleCut()">3/4締切: OFF</button>
        <button onclick="sendDoor('close')">■ ドア全閉</button>
        <button class="open-btn" onclick="sendDoor('open', 'left')">◀ 左ドア</button>
        <button class="open-btn" onclick="sendDoor('open', 'right')">右ドア ▶</button>
    </div>

    <div class="label">4. 行先</div>
    <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:8px;">
        <button id="b-katihama" onclick="setDir('館浜')">館浜方面</button>
        <button id="b-akayama" onclick="setDir('赤山町')">赤山町方面</button>
    </div>
    <div id="dest-grid" class="grid4"></div>

    <div class="label">5. 現在駅（正確な停車駅データ）</div>
    <div id="station-list"></div>

    <div id="mic-container"><button id="mic-btn">🎤 指令・放送 (長押し)</button></div>

    <script>
        const config = {
            types: ["普通", "準急", "急行", "快急", "特急", "回送", "試運転"],
            stations: [
                { name: "赤山町", stop: [1,1,1,1,1], trans: "" },
                { name: "西赤山", stop: [1,1,1,0,0], trans: "" },
                { name: "奥峯口", stop: [1,1,1,0,0], trans: "" },
                { name: "日野森", stop: [1,1,1,1,0], trans: "" },
                { name: "高見沢", stop: [1,1,1,0,0], trans: "" },
                { name: "水越",   stop: [1,1,1,1,0], trans: "" },
                { name: "藤江",   stop: [1,1,1,1,0], trans: "" },
                { name: "大道寺", stop: [1,1,1,1,1], trans: "" },
                { name: "江ノ原", stop: [1,1,1,0,0], trans: "" },
                { name: "新野崎", stop: [1,1,1,1,0], trans: "" },
                { name: "新井川", stop: [1,0,0,0,0], trans: "" },
                { name: "羽衣橋", stop: [1,0,0,0,0], trans: "" },
                { name: "浜園",   stop: [1,1,0,0,0], trans: "自営R線" },
                { name: "津崎",   stop: [1,0,0,0,0], trans: "" },
                { name: "虹ケ浜", stop: [1,0,0,0,0], trans: "" },
                { name: "海岸公園", stop: [1,0,0,0,0], trans: "" },
                { name: "河原崎", stop: [1,0,0,0,0], trans: "" },
                { name: "駒野",   stop: [1,1,0,0,0], trans: "" },
                { name: "館浜",   stop: [1,1,1,1,1], trans: "自営R線" }
            ]
        };

        let conn, peer, localStream, isCut = false, isSos = false;
        let selType = "普通", selDest = "館浜", selBound = "館浜";

        function init() {
            const tg = document.getElementById('type-grid');
            config.types.forEach(t => { const b = document.createElement('button'); b.innerText = t; b.onclick = () => { selType = t; updateUI(); }; tg.appendChild(b); });
            const dg = document.getElementById('dest-grid');
            config.stations.forEach(st => { const b = document.createElement('button'); b.innerText = st.name; b.onclick = () => { selDest = st.name; updateUI(); }; dg.appendChild(b); });
            const mb = document.getElementById('mic-btn');
            mb.onpointerdown = (e) => { e.preventDefault(); micOn(); }; mb.onpointerup = mb.onpointerleave = micOff;
            connect();
        }

        function connect() {
            const id = new URLSearchParams(window.location.search).get('id');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(id);
                conn.on('open', () => { document.getElementById('status').innerText = "指令通信確立"; document.getElementById('status').style.background = "#2ecc71"; updateUI(); });
            });
        }

        function updateUI() {
            document.getElementById('b-katihama').className = selBound === '館浜' ? 'active' : '';
            document.getElementById('b-akayama').className = selBound === '赤山町' ? 'active' : '';
            document.querySelectorAll('#type-grid button').forEach(b => b.className = b.innerText === selType ? 'active' : '');
            document.querySelectorAll('#dest-grid button').forEach(b => b.className = b.innerText === selDest ? 'active' : '');
            
            const list = document.getElementById('station-list'); list.innerHTML = '';
            const tIdx = config.types.indexOf(selType);
            
            if(tIdx > 4) { // 回送・試運転
                 const b = document.createElement('button'); b.className = "st-btn"; b.innerText = "特殊運用（全駅通過）開始";
                 b.onclick = () => conn.send({ type:'update', now:'---', next:'---', trainType:selType, dest:"", bound:selBound });
                 list.appendChild(b); return;
            }
            
            let sts = (selBound === "赤山町") ? [...config.stations].reverse() : [...config.stations];
            sts.forEach((st, i) => {
                if(st.stop[tIdx] === 1) {
                    const b = document.createElement('button'); b.className = "st-btn"; b.innerText = st.name;
                    b.onclick = () => {
                        let next = "終点";
                        for(let j=i+1; j<sts.length; j++) { if(sts[j].stop[tIdx] === 1) { next = sts[j].name; break; } }
                        if(st.name === selDest) next = "終点";
                        if(conn) conn.send({ type:'update', now:st.name, next:next, trainType:selType, dest:selDest, bound:selBound, transfer:st.trans });
                    };
                    list.appendChild(b);
                }
            });
        }

        function sendDoor(s, side='none') { if(conn) conn.send({ type:'door', status:s, side:side }); }
        function sendTicker(t) { if(conn) conn.send({ type:'ticker', text:t }); }
        function toggleCut() { isCut = !isCut; document.getElementById('cut-switch').innerText = isCut ? "3/4締切: ON" : "3/4締切: OFF"; document.getElementById('cut-switch').className = isCut ? 'active' : ''; if(conn) conn.send({ type:'cut', active:isCut }); }
        function toggleSOS() { isSos = !isSos; document.getElementById('sos-btn').className = isSos ? 'emergency-btn active' : 'emergency-btn'; if(conn) conn.send({ type:'emergency', active:isSos }); }
        function setDir(d) { selBound = d; updateUI(); }
        async function micOn() { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); peer.call(new URLSearchParams(window.location.search).get('id'), localStream); }
        function micOff() { if(localStream) localStream.getTracks().forEach(t => t.stop()); }
    </script>
</body>
</html>
