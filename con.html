<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作盤 (スマホ用)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; margin: 0; padding: 15px; }
        .st-btn { width: 100%; text-align: left; padding: 20px; margin-bottom: 10px; background: #333; color: white; border: none; border-left: 10px solid #2ecc71; font-size: 18px; font-weight: bold; border-radius: 5px; }
        .st-btn:active { background: #444; }
        #status { text-align: center; padding: 10px; font-weight: bold; margin-bottom: 10px; }
        .online { color: #2ecc71; }
        .offline { color: #e74c3c; }
    </style>
</head>
<body onload="connect()">
    <div id="status" class="offline">接続試行中...</div>
    <div id="station-list"></div>

    <script>
        let conn;
        // 送っていただいた駅名リスト
        const stations = ["赤山町", "西赤山", "奥峯口", "日野森", "高見沢", "水越", "藤江", "大道寺", "江ノ原", "新野崎", "新井川", "羽衣橋", "浜園", "津崎", "虹ケ浜", "海岸公園", "河原崎", "駒野", "館浜"];

        function connect() {
            const params = new URLSearchParams(window.location.search);
            const targetID = params.get('id'); // QRから渡されたIDを取得

            if (!targetID) {
                document.getElementById('status').innerText = "エラー: IDが見つかりません";
                return;
            }

            const peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetID);
                conn.on('open', () => {
                    document.getElementById('status').innerText = "● PCに接続しました";
                    document.getElementById('status').className = "online";
                });
            });

            // ボタン作成
            const list = document.getElementById('station-list');
            stations.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'st-btn';
                btn.innerText = name;
                btn.onclick = () => {
                    if (conn && conn.open) conn.send({ type: 'next', val: name });
                };
                list.appendChild(btn);
            });
        }
    </script>
</body>
</html>
