<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>館浜電鉄 運行指令</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; padding-bottom: 180px; }
        .section { font-size: 11px; color: #ffcc00; margin: 10px 0; font-weight: bold; border-left: 3px solid #ffcc00; padding-left: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { background: #222; border: 1px solid #444; color: #fff; padding: 12px 0; border-radius: 5px; font-size: 12px; font-weight: bold; }
        button.active { background: #ffcc00; color: #000; }
        .sos { background: #900; grid-column: span 3; border: 2px solid red; height: 45px; }
        .st-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 5px; background: #111; border-left: 8px solid #444; color: #fff; font-size: 16px; }
        #mic-wrap { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px 0; border-top: 2px solid #333; text-align: center; z-index: 100; }
        #mic-btn { width: 90%; height: 60px; background: #ff3b30; color: #fff; border: none; font-size: 18px; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body onload="init()">
    <div id="stat" style="text-align:center; font-size:12px; color:#aaa; margin-bottom:10px;">接続待機中...</div>

    <div class="section">🚨 指令・緊急</div>
    <div class="grid">
        <button class="sos" id="sos-btn" onclick="toggleSOS()">防護無線(SOS)発報</button>
        <button id="cut-btn" onclick="toggleCut()">3/4締切切替</button>
        <button onclick="sendTicker('平常通り運転しています。')">平常運転</button>
        <button onclick="sendTicker('【運行情報】現在、先行列車との間隔調整のため停車しております。')">間隔調整</button>
    </div>

    <div class="section">1. 種別</div>
    <div id="type-grid" class="grid"></div>

    <div class="section">2. 行先・方面</div>
    <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <button id="b-up" onclick="setDir('館浜')">館浜 方面</button>
        <button id="b-down" onclick="setDir('赤山町')">赤山町 方面</button>
    </div>
    <div id="dest-grid" class="grid" style="grid-template-columns: repeat(4, 1fr); margin-top:5px;"></div>

    <div class="section">3. ドア操作</div>
    <div class="grid">
        <button style="background:#e67e22" onclick="sendDoor('open', 'left')">左ドア開</button>
        <button style="background:#e67e22" onclick="sendDoor('open', 'right')">右ドア開</button>
        <button style="background:#2980b9" onclick="sendDoor('close')">ドア全閉</button>
    </div>

    <div class="section">4. 現在駅選択（停車駅連動）</div>
    <div id="station-list"></div>

    <div id="mic-wrap"><button id="mic-btn">🎤 指令・放送 (長押しで通話)</button></div>

    <script>
        const config = {
            types: ["普通", "準急", "急行", "快急", "特急"],
            stations: [
                { name: "赤山町", stop: [1,1,1,1,1] }, { name: "西赤山", stop: [1,1,1,0,0] },
                { name: "奥峯口", stop: [1,1,1,0,0] }, { name: "日野森", stop: [1,1,1,1,0] },
                { name: "高見沢", stop: [1,1,1,0,0] }, { name: "水越",   stop: [1,1,1,1,0] },
                { name: "藤江",   stop: [1,1,1,1,0] }, { name: "大道寺", stop: [1,1,1,1,1] },
                { name: "江ノ原", stop: [1,1,1,0,0] }, { name: "新野崎", stop: [1,1,1,1,0] },
                { name: "新井川", stop: [1,0,0,0,0] }, { name: "羽衣橋", stop: [1,0,0,0,0] },
                { name: "浜園",   stop: [1,1,0,0,0] }, { name: "津崎",   stop: [1,0,0,0,0] },
                { name: "虹ケ浜", stop: [1,0,0,0,0] }, { name: "海岸公園", stop: [1,0,0,0,0] },
                { name: "河原崎", stop: [1,0,0,0,0] }, { name: "駒野",   stop: [1,1,0,0,0] },
                { name: "館浜",   stop: [1,1,1,1,1] }
            ]
        };

        let conn, peer, localStream, selType="普通", selDest="館浜", selBound="館浜", isSos=false, isCut=false;

        function init() {
            config.types.forEach(t => {
                const b = document.createElement('button'); b.innerText = t;
                b.onclick = () => { selType = t; updateUI(); }; document.getElementById('type-grid').appendChild(b);
            });
            config.stations.forEach(st => {
                const b = document.createElement('button'); b.innerText = st.name;
                b.onclick = () => { selDest = st.name; updateUI(); }; document.getElementById('dest-grid').appendChild(b);
            });
            const mb = document.getElementById('mic-btn');
            mb.onpointerdown = (e) => { e.preventDefault(); micOn(); }; mb.onpointerup = micOff;
            connect();
        }

        function connect() {
            const id = new URLSearchParams(window.location.search).get('id');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(id);
                conn.on('open', () => { 
                    document.getElementById('stat').innerText = "指令接続中";
                    document.getElementById('stat').style.color = "#2ecc71";
                    updateUI();
                });
            });
        }

        function updateUI() {
            document.getElementById('b-up').className = (selBound === '館浜' ? 'active' : '');
            document.getElementById('b-down').className = (selBound === '赤山町' ? 'active' : '');
            document.querySelectorAll('#type-grid button').forEach(b => b.className = (b.innerText === selType ? 'active' : ''));
            document.querySelectorAll('#dest-grid button').forEach(b => b.className = (b.innerText === selDest ? 'active' : ''));
            
            const list = document.getElementById('station-list'); list.innerHTML = '';
            const tIdx = config.types.indexOf(selType);
            let sts = (selBound === "赤山町") ? [...config.stations].reverse() : [...config.stations];
            
            sts.forEach((st, i) => {
                if(st.stop[tIdx] === 1) {
                    const b = document.createElement('button'); b.className = "st-btn"; b.innerText = st.name;
                    b.onclick = () => {
                        let next = "終点";
                        for(let j=i+1; j<sts.length; j++) { if(sts[j].stop[tIdx] === 1) { next = sts[j].name; break; } }
                        if(st.name === selDest) next = "終点";
                        if(conn) conn.send({ type:'update', now:st.name, next:next, trainType:selType, dest:selDest, bound:selBound });
                    };
                    list.appendChild(b);
                }
            });
        }

        function sendDoor(s, side='none') { if(conn) conn.send({ type:'door', status:s, side:side }); }
        function sendTicker(t) { if(conn) conn.send({ type:'ticker', text:t }); }
        function toggleSOS() { isSos = !isSos; document.getElementById('sos-btn').className = isSos ? 'sos active' : 'sos'; if(conn) conn.send({ type:'emergency', active:isSos }); }
        function toggleCut() { isCut = !isCut; document.getElementById('cut-btn').className = isCut ? 'active' : ''; if(conn) conn.send({ type:'cut', active:isCut }); }
        function setDir(d) { selBound = d; updateUI(); }
        async function micOn() { 
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                peer.call(new URLSearchParams(window.location.search).get('id'), localStream);
                document.getElementById('mic-btn').style.background = "#2ecc71";
            } catch(e) { alert("マイク使用不可"); }
        }
        function micOff() { 
            if(localStream) localStream.getTracks().forEach(t => t.stop()); 
            document.getElementById('mic-btn').style.background = "#ff3b30";
        }
    </script>
</body>
</html>
