<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>操作盤</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; padding-bottom: 100px; }
        .section { background: #1c1c1e; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 14px; color: #aaa; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { background: #333; border: none; color: #fff; padding: 15px 5px; border-radius: 8px; font-weight: bold; }
        button.active { background: #ffcc00; color: #000; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .st-row { display: flex; align-items: center; background: #2c2c2e; margin: 5px 0; padding: 10px; border-radius: 5px; }
        #mic-btn { width: 100%; height: 60px; background: #ff3b30; margin-top: 10px; border-radius: 30px; font-size: 20px; }
    </style>
</head>
<body onload="init()">
    <div class="section">
        <h3>運行設定</h3>
        <input type="text" placeholder="路線名 (例: 館濱線)" onchange="sendData('line', this.value)">
        <div class="grid" style="margin-top:10px;">
            <button onclick="sendData('dest', '新井川')">新井川 行</button>
            <button onclick="sendData('dest', '館浜')">館浜 行</button>
            <button onclick="sendData('type', '普通')">普通</button>
            <button onclick="sendData('type', '快速')">快速</button>
            <button onclick="sendData('type', '特急')">特急</button>
        </div>
    </div>

    <div class="section">
        <h3>駅名指示</h3>
        <div id="st-list"></div>
    </div>

    <div style="position:fixed; bottom:0; left:0; width:100%; padding:10px; background:#000; box-sizing:border-box;">
        <button id="mic-btn" ontouchstart="micOn()" ontouchend="micOff()">🎤 放送開始</button>
    </div>

    <script>
        let conn, peer, call;
        const sts = ["館浜", "駒野", "河原崎", "海岸公園", "虹ケ浜", "津崎", "浜園", "羽衣橋", "新井川"];

        function init() {
            const targetID = new URLSearchParams(window.location.search).get('id') || "TH-SYSTEM-MAIN";
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetID);
                conn.on('open', () => { document.body.style.borderTop = "5px solid #28a745"; });
            });

            const list = document.getElementById('st-list');
            sts.forEach(s => {
                const div = document.createElement('div');
                div.className = 'st-row';
                div.innerText = s;
                div.onclick = () => sendData('station', s);
                list.appendChild(div);
            });
        }

        function sendData(type, val) { if(conn) conn.send({type, val}); }

        async function micOn() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const targetID = new URLSearchParams(window.location.search).get('id') || "TH-SYSTEM-MAIN";
            call = peer.call(targetID, stream);
            document.getElementById('mic-btn').style.background = "#fff";
        }
        function micOff() { if(call) call.close(); document.getElementById('mic-btn').style.background = "#ff3b30"; }
    </script>
</body>
</html>
