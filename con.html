<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>館浜電鉄 統合コンソール V6</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; margin: 0; padding: 10px; padding-bottom: 240px; user-select: none; }
        .label { font-size: 11px; color: #aaa; margin: 15px 0 6px; font-weight: bold; border-left: 4px solid #ffcc00; padding-left: 8px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { background: #333; border: none; color: #fff; padding: 12px 2px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        button.active { background: #ffcc00; color: #000; }
        .open-btn { background: #e67e22; height: 60px; font-size: 15px; }
        .close-btn { background: #2980b9; height: 60px; font-size: 15px; }
        .st-btn { width: 100%; text-align: left; padding: 16px; margin-bottom: 8px; background: #222; border-left: 10px solid #444; border-radius: 4px; font-size: 17px; color: #fff; }
        .ticker-btn { background: #444; font-size: 11px; height: 40px; }
        #mic-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #222; padding: 15px 0; border-top: 2px solid #444; z-index: 100; }
        #mic-btn { width: 90%; height: 80px; display: block; margin: 0 auto; background: #ff3b30; border: none; color: #fff; font-size: 20px; font-weight: bold; border-radius: 15px; touch-action: none; }
        #v-meter { height: 8px; background: #000; width: 90%; margin: 0 auto 10px; border-radius: 4px; overflow: hidden; }
        #v-bar { width: 0%; height: 100%; background: #2ecc71; transition: width 0.1s; }
    </style>
</head>
<body onload="init()">
    <div id="status" style="text-align:center; font-size:12px; padding:6px; background:#333;">接続待機中...</div>

    <div class="label">1. 種別設定</div>
    <div id="type-grid" class="grid"></div>

    <div class="label">2. 運行情報 (全10パターン)</div>
    <div class="grid">
        <button class="ticker-btn" onclick="sendTicker('平常通り運転しています。')">平常</button>
        <button class="ticker-btn" onclick="sendTicker('強風のため、一部区間で速度を落として運転しています。')">強風</button>
        <button class="ticker-btn" onclick="sendTicker('大雨の影響で、ダイヤに乱れが出ています。')" style="color:#3498db">大雨</button>
        <button class="ticker-btn" onclick="sendTicker('車両点検を行っているため、停車しております。')" style="color:#e74c3c">車両点検</button>
        <button class="ticker-btn" onclick="sendTicker('踏切内の安全確認を行っています。発車までお待ちください。')">踏切確認</button>
        <button class="ticker-btn" onclick="sendTicker('前の列車との間隔調整のため、しばらく停車いたします。')">間隔調整</button>
        <button class="ticker-btn" onclick="sendTicker('本日、館浜花火大会開催のため、臨時ダイヤで運行しています。')">花火臨時</button>
        <button class="ticker-btn" onclick="sendTicker('急病人救護のため、この駅でしばらく停車いたします。')">急病人</button>
        <button class="ticker-btn" onclick="sendTicker('線路内に立ち入りがあったため、安全確認を行っています。')">線路立ち入り</button>
        <button class="ticker-btn" onclick="sendTicker('接続待ちのため、発車が数分遅れる見込みです。')">接続待ち</button>
    </div>

    <div class="label">3. ドア操作</div>
    <button id="cut-switch" style="width:100%; height:40px; margin-bottom:10px;" onclick="toggleCut()">3/4 締切：OFF</button>
    <div class="grid" style="grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="open-btn" onclick="sendDoor('open', 'left')">◀ 左ドア開</button>
        <button class="open-btn" onclick="sendDoor('open', 'right')">右ドア開 ▶</button>
        <button class="close-btn" style="grid-column: span 2" onclick="sendDoor('close')">■ ドア全閉 (発車)</button>
    </div>

    <div class="label">4. 行先設定</div>
    <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:8px;">
        <button id="b-katihama" onclick="setDir('館浜')">館浜 方面</button>
        <button id="b-akayama" onclick="setDir('赤山町')">赤山町 方面</button>
    </div>
    <div id="dest-grid" class="grid4"></div>

    <div class="label">5. 現在駅選択 (放送連動)</div>
    <div id="station-list"></div>

    <div id="mic-container">
        <div id="v-meter"><div id="v-bar"></div></div>
        <button id="mic-btn">🎤 マイク放送 (長押し)</button>
    </div>

    <script>
        const config = {
            types: ["普通", "準急", "急行", "快急", "特急", "回送", "試運転"],
            stations: [
                { name: "赤山町", stop: [1,1,1,1,1], trans: "" },
                { name: "西赤山", stop: [1,1,1,0,0], trans: "" },
                { name: "奥峯口", stop: [1,1,1,0,0], trans: "" },
                { name: "日野森", stop: [1,1,1,1,0], trans: "" },
                { name: "高見沢", stop: [1,1,1,0,0], trans: "" },
                { name: "水越",   stop: [1,1,1,1,0], trans: "" },
                { name: "藤江",   stop: [1,1,1,1,0], trans: "" },
                { name: "大道寺", stop: [1,1,1,1,1], trans: "JR線・モノレール" },
                { name: "江ノ原", stop: [1,1,1,0,0], trans: "" },
                { name: "新野崎", stop: [1,1,1,1,0], trans: "" },
                { name: "新井川", stop: [1,0,0,0,0], trans: "" },
                { name: "羽衣橋", stop: [1,0,0,0,0], trans: "" },
                { name: "浜園",   stop: [1,1,0,0,0], trans: "" },
                { name: "津崎",   stop: [1,0,0,0,0], trans: "" },
                { name: "虹ケ浜", stop: [1,0,0,0,0], trans: "" },
                { name: "海岸公園", stop: [1,0,0,0,0], trans: "" },
                { name: "河原崎", stop: [1,0,0,0,0], trans: "" },
                { name: "駒野",   stop: [1,1,0,0,0], trans: "バス乗り換え" },
                { name: "館浜",   stop: [1,1,1,1,1], trans: "海岸線・フェリー" }
            ]
        };

        let conn, peer, localStream, audioContext, analyser, dataArray, animationId, isCut = false;
        let selType = "普通", selDest = "館浜", selBound = "館浜";

        function init() {
            const tg = document.getElementById('type-grid');
            config.types.forEach(t => {
                const b = document.createElement('button'); b.innerText = t;
                b.onclick = () => { selType = t; updateUI(); }; tg.appendChild(b);
            });
            const dg = document.getElementById('dest-grid');
            config.stations.forEach(st => {
                const b = document.createElement('button'); b.innerText = st.name;
                b.onclick = () => { selDest = st.name; updateUI(); }; dg.appendChild(b);
            });
            const mb = document.getElementById('mic-btn');
            mb.onpointerdown = (e) => { e.preventDefault(); micOn(); };
            mb.onpointerup = mb.onpointerleave = micOff;
            connect();
        }

        function connect() {
            const id = new URLSearchParams(window.location.search).get('id');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(id);
                conn.on('open', () => { document.getElementById('status').innerText = "ONLINE"; document.getElementById('status').style.background = "#2ecc71"; });
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('b-katihama').className = selBound === '館浜' ? 'active' : '';
            document.getElementById('b-akayama').className = selBound === '赤山町' ? 'active' : '';
            document.querySelectorAll('#type-grid button').forEach(b => b.className = b.innerText === selType ? 'active' : '');
            document.querySelectorAll('#dest-grid button').forEach(b => b.className = b.innerText === selDest ? 'active' : '');

            const list = document.getElementById('station-list'); list.innerHTML = '';
            const tIdx = config.types.indexOf(selType);
            if(tIdx > 4) { // 回送・試運転
                 const b = document.createElement('button'); b.className = "st-btn"; b.innerText = "運行開始（表示更新）";
                 b.onclick = () => conn.send({ type:'update', now:'---', next:'---', trainType:selType, dest:selDest, bound:selBound });
                 list.appendChild(b); return;
            }
            
            let sts = (selBound === "赤山町") ? [...config.stations].reverse() : [...config.stations];
            sts.forEach((st, i) => {
                if(st.stop[tIdx] === 1) {
                    const b = document.createElement('button'); b.className = "st-btn"; b.innerText = st.name;
                    b.onclick = () => {
                        let next = "終点";
                        for(let j=i+1; j<sts.length; j++) { if(sts[j].stop[tIdx] === 1) { next = sts[j].name; break; } }
                        if(st.name === selDest) next = "終点";
                        if(conn) conn.send({ type:'update', now:st.name, next:next, trainType:selType, dest:selDest, bound:selBound, transfer:st.trans });
                    };
                    list.appendChild(b);
                }
            });
        }

        function sendDoor(s, side='none') { if(conn) conn.send({ type:'door', status:s, side:side }); }
        function sendTicker(t) { if(conn) conn.send({ type:'ticker', text:t }); }
        function toggleCut() { isCut = !isCut; document.getElementById('cut-switch').innerText = isCut ? "3/4 締切：ON" : "3/4 締切：OFF"; document.getElementById('cut-switch').className = isCut ? 'active' : ''; if(conn) conn.send({ type:'cut', active:isCut }); }
        function setDir(d) { selBound = d; updateUI(); }

        async function micOn() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peer.call(new URLSearchParams(window.location.search).get('id'), localStream);
                audioContext = new AudioContext();
                const src = audioContext.createMediaStreamSource(localStream);
                analyser = audioContext.createAnalyser(); src.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                const loop = () => {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0; for(let v of dataArray) sum += v;
                    document.getElementById('v-bar').style.width = Math.min((sum/dataArray.length)*2.5, 100) + "%";
                    animationId = requestAnimationFrame(loop);
                }; loop();
            } catch(e) { alert("マイク使用を許可してください"); }
        }
        function micOff() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(audioContext) audioContext.close();
            cancelAnimationFrame(animationId); document.getElementById('v-bar').style.width = "0%";
        }
    </script>
</body>
</html>
