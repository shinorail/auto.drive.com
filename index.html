<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>館浜電鉄 統合運行管理システム Pro</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'館浜電鉄運行システム','short_name':'運行システム','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#ff3b30'}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        :root {
            --bg: #000; --panel: #1c1c1e; --text: #fff; --accent: #ffcc00;
            --danger: #ff3b30; --success: #28a745;
        }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text); margin: 0; padding: 0;
            user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }

        /* モード選択 */
        #mode-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        .mode-btn { width: 80%; padding: 30px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .pc-btn { background: #333; color: #fff; }
        .mb-btn { background: var(--accent); color: #000; }

        /* --- 親機（PC）表示表示 --- */
        #pc-view { display: none; height: 100vh; flex-direction: column; justify-content: center; text-align: center; }
        #st-name-disp { font-size: 120px; font-weight: bold; border-bottom: 8px solid var(--accent); margin: 0 50px; }
        #status-info { font-size: 45px; color: var(--danger); margin-top: 50px; height: 60px; }
        #id-label { position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #444; }

        /* --- 子機（スマホ）操作パネル --- */
        #mb-view { display: none; padding-bottom: 120px; }
        header { 
            position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 10px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        #clock { font-size: 24px; font-weight: bold; font-family: monospace; }
        
        .type-nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .t-btn { border: none; padding: 15px 0; font-size: 12px; font-weight: bold; color: #fff; opacity: 0.3; }
        .t-btn.active { opacity: 1; border-bottom: 4px solid #fff; }
        .t-local { background: #666; } .t-semi { background: #007aff; } .t-express { background: #ff9500; } .t-rapid { background: #af52de; } .t-limited { background: #ff3b30; }

        .list { padding: 5px; }
        .row { 
            display: flex; align-items: center; min-height: 70px; margin-bottom: 5px; 
            background: var(--panel); border-radius: 8px; border-left: 10px solid #444; 
        }
        .row.stop { border-left-color: var(--accent); }
        .row.done { opacity: 0.2; transform: scale(0.95); }

        /* 放送ボタン */
        .mic-area {
            position: fixed; bottom: 0; width: 100%; background: #111; 
            display: flex; align-items: center; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333;
        }
        .mic-btn {
            width: 80px; height: 80px; border-radius: 50%; background: #333; border: 5px solid #555;
            color: white; font-weight: bold; font-size: 14px;
        }
        .mic-btn.active { background: var(--danger); border-color: #fff; box-shadow: 0 0 15px var(--danger); }
        .cmd-btn { background: #444; color: white; border: none; padding: 10px 15px; border-radius: 5px; }

    </style>
</head>
<body onload="initApp()">

<div id="mode-select">
    <h1>館浜電鉄 運行管理システム</h1>
    <button class="mode-btn pc-btn" onclick="startPC()">PC：親機<br><small>（車両表示・スピーカー）</small></button>
    <button class="mode-btn mb-btn" onclick="startMB()">スマホ：子機<br><small>（リモコン・車内マイク）</small></button>
</div>

<div id="pc-view">
    <div id="st-name-disp">案内待機中</div>
    <div id="status-info"></div>
    <div id="id-label">SYSTEM-ID: <span id="my-peer-id">---</span></div>
    <audio id="remote-audio" autoplay></audio>
</div>

<div id="mb-view">
    <header>
        <div id="clock">00:00:00</div>
        <div style="font-size: 10px; color: var(--success);" id="conn-status">未接続</div>
    </header>
    <nav class="type-nav">
        <button class="t-btn t-local active" onclick="chgType('local', this)">普通</button>
        <button class="t-btn t-semi" onclick="chgType('semi', this)">準急</button>
        <button class="t-btn t-express" onclick="chgType('express', this)">急行</button>
        <button class="t-btn t-rapid" onclick="chgType('rapid', this)">快急</button>
        <button class="t-btn t-limited" onclick="chgType('limited', this)">特急</button>
    </nav>
    <div class="list" id="list"></div>
    
    <div class="mic-area">
        <button class="cmd-btn" onclick="sendCmd('⚠️ ドアが閉まります')">ドア閉</button>
        <button id="mic-btn" class="mic-btn" ontouchstart="micOn()" ontouchend="micOff()" onmousedown="micOn()" onmouseup="micOff()">🎤 放送</button>
        <button class="cmd-btn" onclick="sendCmd('🎵 発車メロディ')">発メロ</button>
    </div>
</div>

<script>
    const stations = [
        { n: "赤山町", s: [1,1,1,1,1] }, { n: "西赤山", s: [1,1,1,0,0] }, { n: "奥峯口", s: [1,1,1,0,0] },
        { n: "日野森", s: [1,1,1,1,0] }, { n: "高見沢", s: [1,1,1,0,0] }, { n: "水越", s: [1,1,1,1,0] },
        { n: "藤江", s: [1,1,1,1,0] }, { n: "大道寺", s: [1,1,1,1,1] }, { n: "江ノ原", s: [1,1,1,0,0] },
        { n: "新野崎", s: [1,1,1,1,0] }, { n: "館浜", s: [1,1,1,1,1] }
    ];
    const idxMap = { local: 0, semi: 1, express: 2, rapid: 3, limited: 4 };
    const SYSTEM_ID = "tatehama-pro-2026"; // 共通ID
    let peer, conn, currentCall;
    let currentType = 'local';

    function initApp() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP', {hour12:false});
        }, 1000);
    }

    // --- 親機（PC）ロジック ---
    function startPC() {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('pc-view').style.display = 'flex';
        peer = new Peer(SYSTEM_ID);
        peer.on('open', id => document.getElementById('my-peer-id').innerText = id);
        peer.on('connection', c => {
            conn = c;
            conn.on('data', data => {
                if(data.type === 'station') document.getElementById('st-name-disp').innerText = "次 は " + data.val;
                if(data.type === 'cmd') {
                    const info = document.getElementById('status-info');
                    info.innerText = data.val;
                    setTimeout(() => info.innerText = "", 3000);
                }
            });
        });
        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                document.getElementById('remote-audio').srcObject = stream;
            });
        });
    }

    // --- 子機（スマホ）ロジック ---
    function startMB() {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('mb-view').style.display = 'block';
        render();
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(SYSTEM_ID);
            conn.on('open', () => document.getElementById('conn-status').innerText = "PC接続済");
        });
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        stations.forEach(st => {
            const isStop = st.s[idxMap[currentType]];
            const div = document.createElement('div');
            div.className = `row ${isStop ? 'stop' : ''}`;
            div.innerHTML = `<div style="width:50px; text-align:center; font-weight:bold; color:var(--accent)">${isStop?'停車':''}</div><div style="font-size:22px; font-weight:bold;">${st.n}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.row').forEach(r => r.classList.remove('done'));
                div.classList.add('done');
                if(conn) conn.send({ type: 'station', val: st.n });
                if('wakeLock' in navigator) navigator.wakeLock.request('screen');
            };
            list.appendChild(div);
        });
    }

    function chgType(t, btn) {
        currentType = t;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    async function micOn() {
        document.getElementById('mic-btn').classList.add('active');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        currentCall = peer.call(SYSTEM_ID, stream);
    }

    function micOff() {
        document.getElementById('mic-btn').classList.remove('active');
        if(currentCall) currentCall.close();
    }

    function sendCmd(txt) {
        if(conn) conn.send({ type: 'cmd', val: txt });
    }
</script>
</body>
</html>
