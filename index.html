<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>館浜電鉄 案内表示システム</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --bg: #000; --accent: #ffcc00; --text: #fff; --danger: #ff3b30; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }

        /* 案内表示メイン */
        #st-name { 
            font-size: 12vw; 
            font-weight: bold; 
            border-bottom: 12px solid var(--accent); 
            padding-bottom: 10px; 
            width: 90%; 
            text-align: center; 
            letter-spacing: 0.1em;
        }

        /* 運行コマンド表示（ドア閉、発メロなど） */
        #status-msg { 
            font-size: 5vw; 
            color: var(--danger); 
            margin-top: 40px; 
            height: 1.5em; 
            font-weight: bold; 
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
        }

        /* 接続待機用QRエリア */
        #qr-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        #qrcode { 
            background: #fff; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .qr-text { margin-top: 20px; font-size: 18px; color: var(--accent); font-weight: bold; }

        /* 通信状態インジケーター */
        #conn-stat {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

    <div id="st-name">案内準備中</div>
    <div id="status-msg"></div>
    <div id="conn-stat">OFFLINE</div>

    <div id="qr-overlay">
        <div id="qrcode"></div>
        <p class="qr-text">スマホのカメラでスキャンして接続</p>
        <p style="font-size:12px; color:#666;">※ con.html へ自動接続します</p>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        // 1. PeerIDの生成（接続用のランダムな合言葉）
        const pairID = "TH-" + Math.random().toString(36).substring(2, 8).toUpperCase();
        const peer = new Peer(pairID);

        // 2. QRコードの生成
        peer.on('open', (id) => {
            console.log('My ID:', id);
            document.getElementById('conn-stat').innerText = "ID: " + id;
            
            // 現在のURLを取得して con.html へのリンクを作成
            const currentUrl = window.location.href.split('?')[0];
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            const targetUrl = `${baseUrl}/con.html?id=${id}`;

            // QRコード描画
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        });

        // 3. スマホ（子機）とのデータ接続
        peer.on('connection', (conn) => {
            // 接続されたらQRコードを隠す
            document.getElementById('qr-overlay').style.display = 'none';
            document.getElementById('conn-stat').innerText = "CONNECTED";
            document.getElementById('conn-stat').style.color = "#28a745";

            conn.on('data', (data) => {
                console.log("Recv:", data);
                
                // 駅名更新
                if(data.type === 'station') {
                    document.getElementById('st-name').innerText = "次 は " + data.val;
                }
                
                // コマンド表示（ドア閉、メロディなど）
                if(data.type === 'cmd') {
                    const msgArea = document.getElementById('status-msg');
                    msgArea.innerText = data.val;
                    // 4秒後に消去
                    setTimeout(() => {
                        if(msgArea.innerText === data.val) msgArea.innerText = "";
                    }, 4000);
                }
            });
        });

        // 4. 音声通話（マイク放送）の受信
        peer.on('call', (call) => {
            call.answer(); // 応答
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = remoteStream;
                audio.play();
            });
        });

        // サービスワーカーの登録（PWA用）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker Registered');
            });
        }
    </script>
</body>
</html>
