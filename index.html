<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 総合表示システム 極(KIWAMI) V6.1</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        if (window.location.search.indexOf('id=') === -1) { 
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                window.location.href = 'con.html';
            }
        }
    </script>
    <style>
        :root { --th-green: #2ecc71; --th-red: #ff3b30; --th-orange: #e67e22; --th-blue: #2980b9; --th-light: #f2f2f2; }
        body { background: #000; margin: 0; color: #fff; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 850px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 側面幕 */
        .external-maku { background: #000; border: 8px solid #444; border-radius: 12px; height: 160px; display: flex; align-items: center; padding: 0 30px; }
        .maku-box { height: 90px; overflow: hidden; border: 3px solid #fff; margin-right: 20px; min-width: 240px; text-align: center; background: #000; }
        .dest-box { height: 90px; overflow: hidden; flex-grow: 1; border: 3px solid #fff; background: #000; }
        .rolling-text { font-size: 70px; font-weight: bold; line-height: 90px; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .blur { filter: blur(3px); }

        /* 車内案内LCD */
        .internal-lcd { background: #fff; color: #000; flex-grow: 1; border: 6px solid #333; display: flex; overflow: hidden; position: relative; }
        .lcd-main { flex: 7; padding: 30px; display: flex; flex-direction: column; border-right: 5px solid #000; }
        header { border-bottom: 6px solid #000; display: flex; align-items: center; padding-bottom: 15px; margin-bottom: 20px; }
        .lcd-bound { font-size: 26px; font-weight: bold; background: #000; color: #fff; padding: 6px 15px; margin-right: 20px; }
        .lcd-type { font-size: 40px; font-weight: bold; border: 4px solid #000; padding: 0 15px; }
        .lcd-now-st { font-size: 55px; font-weight: bold; flex-grow: 1; text-align: right; }
        
        .next-st { font-size: 150px; font-weight: bold; text-align: center; margin: 10px 0; letter-spacing: -5px; line-height: 1.1; }
        .transfer-box { background: var(--th-light); padding: 15px; border-radius: 10px; margin-top: 10px; font-weight: bold; font-size: 24px; display: none; border-left: 10px solid var(--th-blue); }

        /* 特殊運用 */
        #not-service { display: none; text-align: center; margin-top: 60px; }
        .special-warn { color: var(--th-red); font-size: 80px; font-weight: bold; }

        /* ドアアニメーション */
        .door-info-area { margin-top: auto; padding: 20px; background: var(--th-light); border-radius: 15px; text-align: center; }
        #door-msg { font-size: 28px; font-weight: bold; height: 35px; margin-bottom: 15px; }
        .door-visual { width: 360px; height: 120px; background: #888; margin: 0 auto; position: relative; border: 5px solid #333; overflow: hidden; }
        .door-leaf { width: 50%; height: 100%; background: linear-gradient(90deg, #bbb, #eee, #bbb); border: 1px solid #666; position: absolute; top: 0; transition: transform 0.8s ease-in-out; }
        .door-l { left: 0; } .door-r { right: 0; }
        .door-open .door-l { transform: translateX(-95%); }
        .door-open .door-r { transform: translateX(95%); }
        #cut-badge { position: absolute; top: 20px; right: 20px; background: var(--th-red); color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: none; animation: flash 0.8s infinite; }

        /* 広告・テロップ */
        .lcd-ad { flex: 3; background: #e0e0e0; display: flex; flex-direction: column; }
        #ad-screen { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; text-align: center; padding: 20px; color: #333; }
        .info-ticker { height: 70px; background: #222; color: #fff; overflow: hidden; position: relative; border-top: 6px solid var(--th-orange); }
        #ticker-text { position: absolute; white-space: nowrap; font-size: 28px; font-weight: bold; line-height: 65px; will-change: transform; }

        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="scaler">
        <div class="external-maku">
            <div class="maku-box"><div id="ext-type" class="rolling-text">---</div></div>
            <div class="dest-box"><div id="ext-dest" class="rolling-text">---</div></div>
        </div>
        <div class="internal-lcd">
            <div id="qr-overlay"><div id="qrcode" onclick="document.getElementById('remote-audio').play()"></div><p>画面クリックで開始</p></div>
            <div class="lcd-main">
                <div id="cut-badge">3/4 締切</div>
                <header>
                    <div class="lcd-bound" id="in-bound">---方面</div>
                    <div class="lcd-type" id="in-type">---</div>
                    <div class="lcd-now-st" id="in-now">---</div>
                </header>
                <div id="normal-display">
                    <div style="font-size:28px; color:#666; font-weight:bold;">次は Next</div>
                    <div class="next-st" id="in-next">---</div>
                    <div id="transfer" class="transfer-box"></div>
                </div>
                <div id="not-service">
                    <div class="special-warn">ご乗車になれません</div>
                    <div style="font-size:32px; font-weight:bold; color:#888; margin-top:10px;">Not In Service / Test Run</div>
                </div>
                <div class="door-info-area">
                    <div id="door-msg">ドアが閉まります</div>
                    <div id="door-container" class="door-visual"><div class="door-leaf door-l"></div><div class="door-leaf door-r"></div></div>
                </div>
            </div>
            <div class="lcd-ad">
                <div id="ad-screen">安全第一で<br>運行中</div>
                <div class="info-ticker"><div id="ticker-text">館浜電鉄をご利用くださいましてありがとうございます。</div></div>
            </div>
        </div>
    </div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        const peer = new Peer();
        const ads = ["次は 大道寺","Studio Zen-Node","駆け込み乗車禁止","館浜シーサイドパーク","お忘れ物にご注意"];
        let adIdx = 0;

        setInterval(() => {
            const el = document.getElementById('ad-screen');
            el.style.opacity = 0;
            setTimeout(() => { adIdx = (adIdx+1)%ads.length; el.innerHTML = ads[adIdx]; el.style.opacity = 1; }, 400);
        }, 7000);

        peer.on('open', (id) => {
            const url = window.location.href.split('?')[0].replace('index.html','') + `con.html?id=${id}`;
            new QRCode(document.getElementById("qrcode"), { text: url, width: 220, height: 220 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'update') {
                    const isSpecial = (data.trainType === '回送' || data.trainType === '試運転');
                    document.getElementById('normal-display').style.display = isSpecial ? 'none' : 'block';
                    document.getElementById('not-service').style.display = isSpecial ? 'block' : 'none';
                    animateMaku('ext-type', data.trainType);
                    animateMaku('ext-dest', data.dest + (isSpecial ? '' : ' 行'));
                    document.getElementById('in-bound').innerText = data.bound + "方面";
                    document.getElementById('in-type').innerText = data.trainType;
                    document.getElementById('in-now').innerText = data.now;
                    document.getElementById('in-next').innerText = data.next;
                    const t = document.getElementById('transfer');
                    if(data.transfer) { t.innerText = "お乗り換え： " + data.transfer; t.style.display = 'block'; }
                    else { t.style.display = 'none'; }
                }
                if(data.type === 'door') {
                    const c = document.getElementById('door-container');
                    const m = document.getElementById('door-msg');
                    if(data.status === 'open') {
                        c.classList.add('door-open');
                        m.innerText = (data.side==='left'?'左':'右') + "側のドアが開きます";
                        m.style.color = "var(--th-orange)";
                    } else {
                        c.classList.remove('door-open');
                        m.innerText = "ドアが閉まります";
                        m.style.color = "#000";
                    }
                }
                if(data.type === 'ticker') {
                    const el = document.getElementById('ticker-text');
                    el.style.animation = 'none';
                    el.innerText = data.text;
                    const duration = (el.offsetWidth + 1280) / 160;
                    el.style.animation = `scroll ${duration}s linear infinite`;
                }
                if(data.type === 'cut') document.getElementById('cut-badge').style.display = data.active ? 'block' : 'none';
            });
        });

        function animateMaku(id, text) {
            const el = document.getElementById(id); if(el.innerText === text) return;
            el.classList.add('blur'); el.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                el.style.transition = 'none'; el.style.transform = 'translateY(100%)'; el.innerText = text;
                setTimeout(() => { el.style.transition = ''; el.style.transform = 'translateY(0)'; el.classList.remove('blur'); }, 30);
            }, 250);
        }

        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; }); });
        function setScale() { document.getElementById('scaler').style.transform = `scale(${Math.min(window.innerWidth/1300, window.innerHeight/900)})`; }
        window.onresize = setScale; setScale();
    </script>
</body>
</html>
