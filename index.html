<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 総合表示システム (広告・ドア機能付)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --th-green: #2ecc71; }
        body { background: #1a1a1a; margin: 0; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 850px; display: flex; flex-direction: column; gap: 15px; transform-origin: center; }
        
        .external-maku { background: #000; border: 8px solid #444; border-radius: 10px; height: 160px; display: flex; align-items: center; padding: 0 30px; overflow: hidden; }
        .maku-box { height: 90px; overflow: hidden; position: relative; border: 3px solid #fff; margin-right: 20px; min-width: 200px; text-align: center; }
        .dest-box { height: 90px; overflow: hidden; position: relative; flex-grow: 1; }
        .rolling-text { font-size: 60px; font-weight: bold; line-height: 90px; color: #fff; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .blur { filter: blur(3px); opacity: 0.7; }

        .internal-lcd { background: #fff; color: #000; flex-grow: 1; border: 5px solid #000; position: relative; display: flex; flex-direction: row; overflow: hidden; }
        
        /* メイン案内エリア */
        .lcd-main { flex: 7; padding: 30px; display: flex; flex-direction: column; border-right: 4px solid #000; }
        header { border-bottom: 5px solid #000; display: flex; align-items: center; padding-bottom: 15px; margin-bottom: 20px; }
        .lcd-bound { font-size: 24px; font-weight: bold; background: #000; color: #fff; padding: 5px 12px; margin-right: 15px; }
        .lcd-type { font-size: 32px; font-weight: bold; border: 3px solid #000; padding: 2px 12px; margin-right: 15px; }
        .lcd-now-st { font-size: 50px; font-weight: bold; flex-grow: 1; text-align: right; }
        .next-st { font-size: 130px; font-weight: bold; text-align: center; margin-top: 10px; }

        /* 広告エリア */
        .lcd-ad { flex: 3; background: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .ad-image { width: 90%; height: 60%; background: #ccc; border: 2px solid #999; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #666; font-size: 24px; text-align: center; }
        
        /* ドア方向案内 */
        .door-info { margin-top: 30px; text-align: center; width: 100%; }
        .door-msg { font-size: 24px; font-weight: bold; margin-bottom: 10px; opacity: 0; transition: opacity 0.3s; }
        .door-arrows { display: flex; justify-content: center; gap: 40px; font-size: 60px; font-weight: bold; color: #ccc; }
        .arrow-active { color: #f1c40f; text-shadow: 0 0 15px rgba(241,196,15,0.7); animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
    </style>
</head>
<body>
    <div id="scaler">
        <div class="external-maku">
            <div class="maku-box"><div id="ext-type" class="rolling-text">---</div></div>
            <div class="dest-box"><div id="ext-dest" class="rolling-text">---</div></div>
        </div>
        <div class="internal-lcd">
            <div id="qr-overlay">
                <h1 onclick="document.getElementById('remote-audio').play()">クリックして開始</h1>
                <div id="qrcode"></div>
            </div>
            
            <div class="lcd-main">
                <header>
                    <div class="lcd-bound" id="in-bound">---方面</div>
                    <div class="lcd-type" id="in-type">---</div>
                    <div class="lcd-now-st" id="in-now">---</div>
                </header>
                <main>
                    <div style="font-size:26px; color:#666; font-weight:bold;">次は Next</div>
                    <div class="next-st" id="in-next">---</div>
                </main>
                <div class="door-info">
                    <div id="door-text" class="door-msg">こちら側のドアが開きます</div>
                    <div class="door-arrows">
                        <span id="arrow-l">◀</span>
                        <span id="arrow-r">▶</span>
                    </div>
                </div>
            </div>

            <div class="lcd-ad">
                <div id="ad-box" class="ad-image">館浜電鉄<br>広告エリア</div>
                <div style="margin-top:20px; color:#333; font-weight:bold;">Studio Zen-Node</div>
            </div>
        </div>
    </div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        const peer = new Peer();
        peer.on('open', (id) => {
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            const conUrl = `${baseUrl}/con.html?id=${id}`;
            new QRCode(document.getElementById("qrcode"), { text: conUrl, width: 200, height: 200 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'update') {
                    animateMaku('ext-type', data.trainType);
                    animateMaku('ext-dest', data.dest + " 行");
                    document.getElementById('in-bound').innerText = data.bound + "方面";
                    document.getElementById('in-type').innerText = data.trainType;
                    document.getElementById('in-now').innerText = data.now;
                    document.getElementById('in-next').innerText = data.next;
                    
                    // ドア案内更新
                    const tl = document.getElementById('arrow-l');
                    const tr = document.getElementById('arrow-r');
                    const dt = document.getElementById('door-text');
                    tl.className = data.door === 'left' ? 'arrow-active' : '';
                    tr.className = data.door === 'right' ? 'arrow-active' : '';
                    dt.style.opacity = data.door === 'none' ? '0' : '1';
                    
                    // 広告切り替え（簡易版：行先によって文字を変える例）
                    if(data.dest === "館浜") document.getElementById('ad-box').innerHTML = "海辺の街へ。<br>館浜シーサイドホテル";
                    else if(data.dest === "赤山町") document.getElementById('ad-box').innerHTML = "赤山神社の<br>春祭り開催中";
                }
            });
        });

        function animateMaku(id, text) {
            const el = document.getElementById(id);
            if(el.innerText === text) return;
            el.classList.add('blur'); el.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                el.style.transition = 'none'; el.style.transform = 'translateY(100%)'; el.innerText = text;
                setTimeout(() => { el.style.transition = ''; el.style.transform = 'translateY(0)'; el.classList.remove('blur'); }, 50);
            }, 300);
        }

        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; }); });
        function setScale() { const s = Math.min(window.innerWidth / 1300, window.innerHeight / 900); document.getElementById('scaler').style.transform = `scale(${s})`; }
        window.onresize = setScale; setScale();
    </script>
</body>
</html>
