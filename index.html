<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>館浜電鉄 乗務員支援 Pro</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'館浜電鉄乗務員用','short_name':'乗務支援','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#f44336','icons':[{'src':'https://via.placeholder.com/192/f44336/ffffff?text=運','sizes':'192x192','type':'image/png'}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --accent-stop: #ffcc00;
            --checked-bg: #2c2c2e;
            --checked-text: #636366;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
            touch-action: manipulation; /* ダブルタップズーム防止 */
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.9);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        #current-time { font-size: 26px; font-weight: bold; font-family: 'Courier New', monospace; }
        #wake-status { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: #333; transition: 0.3s; }
        #wake-status.active { background: #28a745; box-shadow: 0 0 8px #28a745; }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            background: #000;
            padding: 2px;
        }

        .type-btn {
            border: none;
            padding: 18px 0;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            opacity: 0.3;
        }

        .type-btn.active { opacity: 1; position: relative; }
        .type-btn.active::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #fff; }

        .type-local { background: #555; }
        .type-semi { background: #007aff; }
        .type-express { background: #ff9500; }
        .type-rapid { background: #af52de; }
        .type-limited { background: #ff3b30; }

        .station-list { padding: 4px; }

        .station-row {
            display: flex;
            align-items: center;
            height: 70px;
            margin-bottom: 4px;
            background: var(--card-bg);
            border-radius: 8px;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        /* 停車駅の強調表示 */
        .station-row.stop { border-left: 12px solid var(--accent-stop); }
        .station-row.pass { opacity: 0.4; border-left: 12px solid #444; }

        /* チェック済み（通過済み）の状態 */
        .station-row.checked {
            background: var(--checked-bg);
            opacity: 0.2;
            transform: scale(0.98);
            border-left-color: #555 !important;
        }

        .indicator {
            width: 60px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }
        .stop .indicator { color: var(--accent-stop); }

        .name-group { flex: 1; margin-left: 10px; }
        .name-ja { font-size: 22px; font-weight: bold; }

        .check-mark {
            width: 40px;
            font-size: 24px;
            color: var(--accent-stop);
            visibility: hidden;
        }
        .checked .check-mark { visibility: visible; }

        @media (min-width: 768px) {
            .station-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <div id="current-time">00:00:00</div>
    <div id="wake-status">SLEEP禁止: OFF</div>
</header>

<nav class="type-selector">
    <button class="type-btn type-local active" onclick="updateView('local', this)">普通</button>
    <button class="type-btn type-semi" onclick="updateView('semi', this)">準急</button>
    <button class="type-btn type-express" onclick="updateView('express', this)">急行</button>
    <button class="type-btn type-rapid" onclick="updateView('rapid', this)">快急</button>
    <button class="type-btn type-limited" onclick="updateView('limited', this)">特急</button>
</nav>

<main class="station-list" id="list-container"></main>

<script>
    const data = [
        { name: "赤山町", stops: [1,1,1,1,1] },
        { name: "西赤山", stops: [1,1,1,0,0] },
        { name: "奥峯口", stops: [1,1,1,0,0] },
        { name: "日野森", stops: [1,1,1,1,0] },
        { name: "高見沢", stops: [1,1,1,0,0] },
        { name: "水越", stops: [1,1,1,1,0] },
        { name: "藤江", stops: [1,1,1,1,0] },
        { name: "大道寺", stops: [1,1,1,1,1] },
        { name: "江ノ原", stops: [1,1,1,0,0] },
        { name: "新野崎", stops: [1,1,1,1,0] },
        { name: "新井川", stops: [1,0,0,0,0] },
        { name: "羽衣橋", stops: [1,0,0,0,0] },
        { name: "浜園", stops: [1,1,0,0,0] },
        { name: "津崎", stops: [1,0,0,0,0] },
        { name: "虹ケ浜", stops: [1,0,0,0,0] },
        { name: "海岸公園", stops: [1,0,0,0,0] },
        { name: "河原崎", stops: [1,0,0,0,0] },
        { name: "駒野", stops: [1,1,0,0,0] },
        { name: "館浜", stops: [1,1,1,1,1] }
    ];

    const typeIdx = { local: 0, semi: 1, express: 2, rapid: 3, limited: 4 };
    let currentWakeLock = null;

    function updateView(type, btn) {
        // 全ボタンのリセット
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        data.forEach(st => {
            const isStop = st.stops[typeIdx[type]];
            const row = document.createElement('div');
            row.className = `station-row ${isStop ? 'stop' : 'pass'}`;
            
            row.innerHTML = `
                <div class="indicator">${isStop ? '停車' : '通過'}</div>
                <div class="name-group"><span class="name-ja">${st.name}</span></div>
                <div class="check-mark">✓</div>
            `;

            // タップでチェックを入れる機能
            row.addEventListener('click', () => {
                row.classList.toggle('checked');
                // タップのたびにWakeLockを確実にする
                requestWakeLock();
            });

            container.appendChild(row);
        });
    }

    // スリープ禁止 (Screen Wake Lock API)
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                currentWakeLock = await navigator.wakeLock.request('screen');
                const status = document.getElementById('wake-status');
                status.innerText = "SLEEP禁止: ON";
                status.classList.add('active');
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
    }

    // 時計の更新
    setInterval(() => {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('ja-JP', {hour12: false});
    }, 1000);

    // 画面復帰時の処理
    document.addEventListener('visibilitychange', async () => {
        if (currentWakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    // 初期表示
    updateView('local', document.querySelector('.type-local'));
</script>

</body>
</html>
