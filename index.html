<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>館浜電鉄 案内表示システム</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --th-green: #2ecc71; --black: #000; }
        body { background-color: #222; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        #display-main {
            width: 1280px; height: 720px; background: white; border: 4px solid #000;
            position: relative; transform-origin: center; flex-shrink: 0;
        }

        /* 接続待ちオーバーレイ */
        #waiting-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.98);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ヘッダーエリア */
        header {
            height: 160px; border-bottom: 5px solid #000;
            display: flex; align-items: center; padding: 0 40px; gap: 30px;
        }
        .type-box { font-size: 50px; font-weight: bold; border: 5px solid #000; padding: 10px 30px; min-width: 120px; text-align: center; }
        .dest-text { font-size: 50px; font-weight: bold; flex-grow: 1; }
        .line-text { font-size: 35px; color: var(--th-green); font-weight: bold; border-left: 3px solid #ccc; padding-left: 30px; }
        
        .station-group { text-align: right; }
        .tadaima { font-size: 25px; color: #666; display: block; }
        .station-now { font-size: 90px; font-weight: bold; line-height: 1; }

        /* コンテンツエリア */
        main { padding: 60px 40px; }
        .progress-container { width: 100%; height: 50px; background: #eee; border-radius: 25px; overflow: hidden; margin-top: 40px; }
        .progress-bar { width: 15%; height: 100%; background: var(--th-green); transition: width 0.5s; }
    </style>
</head>
<body>
    <div id="display-main">
        <div id="waiting-overlay">
            <h1 style="margin-bottom:20px;">操作用QRコード</h1>
            <div id="qrcode"></div>
            <p id="peer-id" style="margin-top:20px; font-weight:bold; color:#666;">接続待機中...</p>
        </div>

        <header>
            <div class="type-box" id="disp-type">普通</div>
            <div class="dest-text" id="disp-dest">新井川 ゆき</div>
            <div class="line-text" id="disp-line">館濱線</div>
            <div class="station-group">
                <span class="tadaima">ただいま</span>
                <div class="station-now" id="disp-st">館浜</div>
            </div>
        </header>

        <main>
            <div style="font-size:30px; font-weight:bold; color:#666;">次は</div>
            <div style="font-size:120px; font-weight:bold; margin-top:10px;" id="disp-next">西赤山</div>
            <div class="progress-container"><div class="progress-bar"></div></div>
        </main>
    </div>

    <script>
        // 画面リサイズ対応
        function resize() {
            const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
            document.getElementById('display-main').style.transform = `scale(${scale})`;
        }
        window.onresize = resize; resize();

        // 通信設定
        const peer = new Peer("TH-DISPLAY-MAIN"); // IDを固定

        peer.on('open', (id) => {
            const conUrl = window.location.href.replace('index.html', 'con.html') + "?id=" + id;
            new QRCode(document.getElementById("qrcode"), { text: conUrl, width: 300, height: 300 });
            document.getElementById('peer-id').innerText = "接続準備完了";
        });

        peer.on('connection', (conn) => {
            document.getElementById('waiting-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'station') document.getElementById('disp-st').innerText = data.val;
                if(data.type === 'next') document.getElementById('disp-next').innerText = data.val;
                if(data.type === 'type') document.getElementById('disp-type').innerText = data.val;
                if(data.type === 'dest') document.getElementById('disp-dest').innerText = data.val + " ゆき";
            });
        });
    </script>
</body>
</html>
