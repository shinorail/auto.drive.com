<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 総合表示システム 極(KIWAMI) V5</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // デバイス判定と自動リダイレクト
        if (window.location.search.indexOf('id=') === -1) { 
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                window.location.href = 'con.html';
            }
        }
    </script>
    <style>
        :root { --th-green: #2ecc71; --th-red: #ff3b30; --th-orange: #e67e22; --th-blue: #2980b9; }
        body { background: #0a0a0a; margin: 0; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 850px; display: flex; flex-direction: column; gap: 15px; transform-origin: center; }
        
        /* 側面幕 */
        .external-maku { background: #000; border: 8px solid #444; border-radius: 12px; height: 160px; display: flex; align-items: center; padding: 0 30px; }
        .maku-box { height: 90px; overflow: hidden; border: 3px solid #fff; margin-right: 20px; min-width: 220px; text-align: center; }
        .dest-box { height: 90px; overflow: hidden; flex-grow: 1; border: 3px solid #fff; }
        .rolling-text { font-size: 65px; font-weight: bold; line-height: 90px; transition: transform 0.6s; }
        .type-kaiso { background: #333; color: #fff; }
        .type-shiten { background: #c0392b; color: #fff; }

        /* LCDユニット */
        .internal-lcd { background: #fff; color: #000; flex-grow: 1; border: 6px solid #333; position: relative; display: flex; overflow: hidden; }
        .lcd-main { flex: 7; padding: 30px; display: flex; flex-direction: column; border-right: 5px solid #000; position: relative; }
        header { border-bottom: 6px solid #000; display: flex; align-items: center; padding-bottom: 15px; margin-bottom: 15px; }
        .lcd-bound { font-size: 26px; font-weight: bold; background: #000; color: #fff; padding: 6px 15px; margin-right: 20px; }
        .lcd-type { font-size: 36px; font-weight: bold; border: 4px solid #000; padding: 2px 15px; }
        .lcd-now-st { font-size: 55px; font-weight: bold; flex-grow: 1; text-align: right; }
        
        /* 次駅・案内 */
        .info-container { flex-grow: 1; }
        .next-label { font-size: 28px; color: #666; font-weight: bold; }
        .next-st { font-size: 130px; font-weight: bold; text-align: center; letter-spacing: -3px; margin: 0; }
        .transfer-box { background: #eee; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; display: none; }

        /* ドアエリア */
        .door-info-area { margin-top: auto; padding: 10px; background: #f2f2f2; border-radius: 15px; text-align: center; position: relative; }
        .door-visual { width: 340px; height: 110px; background: #888; margin: 0 auto; position: relative; border: 5px solid #333; overflow: hidden; }
        .door-leaf { width: 50%; height: 100%; background: linear-gradient(90deg, #ccc, #eee, #ccc); border: 2px solid #555; position: absolute; top: 0; transition: transform 1.2s; }
        .door-l { left: 0; } .door-r { right: 0; }
        .door-open .door-l { transform: translateX(-92%); }
        .door-open .door-r { transform: translateX(92%); }
        #cut-badge { position: absolute; top: 15px; right: 15px; background: var(--th-red); color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; display: none; animation: flash 1s infinite; z-index: 5; }

        /* 広告と運行情報 */
        .lcd-ad { flex: 3; background: #ddd; display: flex; flex-direction: column; }
        #ad-screen { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; text-align: center; padding: 20px; }
        .info-ticker { height: 60px; background: #333; color: #fff; overflow: hidden; position: relative; border-top: 4px solid var(--th-orange); }
        #ticker-text { position: absolute; white-space: nowrap; font-size: 24px; font-weight: bold; line-height: 60px; animation: scroll 15s linear infinite; }

        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div id="scaler">
        <div class="external-maku">
            <div class="maku-box"><div id="ext-type" class="rolling-text">---</div></div>
            <div class="dest-box"><div id="ext-dest" class="rolling-text">---</div></div>
        </div>
        <div class="internal-lcd">
            <div id="qr-overlay"><div id="qrcode" onclick="initAudio()"></div><p>クリックして開始</p></div>
            <div class="lcd-main">
                <div id="cut-badge">3/4 締切中</div>
                <header>
                    <div class="lcd-bound" id="in-bound">---方面</div>
                    <div class="lcd-type" id="in-type">---</div>
                    <div class="lcd-now-st" id="in-now">---</div>
                </header>
                <div class="info-container">
                    <div id="not-service" style="display:none; color:red; font-size:40px; font-weight:bold; text-align:center; margin-top:50px;">ご乗車になれません<br><span style="font-size:24px;">Not in Service</span></div>
                    <div id="normal-info">
                        <div class="next-label">次は Next</div>
                        <div class="next-st" id="in-next">---</div>
                        <div id="transfer" class="transfer-box"></div>
                    </div>
                </div>
                <div class="door-info-area">
                    <div id="door-msg" style="font-size:24px; font-weight:bold; height:30px; margin-bottom:5px;">ドアが閉まります</div>
                    <div id="door-container" class="door-visual"><div class="door-leaf door-l"></div><div class="door-leaf door-r"></div></div>
                </div>
            </div>
            <div class="lcd-ad">
                <div id="ad-screen">Studio Zen-Node<br>System V5</div>
                <div class="info-ticker"><div id="ticker-text">館浜電鉄をご利用くださいましてありがとうございます。</div></div>
            </div>
        </div>
    </div>
    <audio id="remote-audio" autoplay></audio>

    <script>
        const peer = new Peer();
        const ads = ["安全第一","館浜シーサイド","マナー協力","忘れ物注意","Studio Zen-Node"];
        let adIdx = 0;

        // 広告スライド
        setInterval(() => {
            const el = document.getElementById('ad-screen');
            el.style.opacity = 0;
            setTimeout(() => { adIdx = (adIdx+1)%ads.length; el.innerHTML = ads[adIdx]; el.style.opacity = 1; }, 600);
        }, 8000);

        peer.on('open', (id) => {
            const url = window.location.href.split('?')[0].replace('index.html','') + `con.html?id=${id}`;
            new QRCode(document.getElementById("qrcode"), { text: url, width: 200, height: 200 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'update') {
                    const isSpecial = (data.trainType === '回送' || data.trainType === '試運転');
                    document.getElementById('normal-info').style.display = isSpecial ? 'none' : 'block';
                    document.getElementById('not-service').style.display = isSpecial ? 'block' : 'none';
                    
                    animateMaku('ext-type', data.trainType);
                    animateMaku('ext-dest', data.dest + (isSpecial ? '' : ' 行'));
                    document.getElementById('in-bound').innerText = data.bound + "方面";
                    document.getElementById('in-type').innerText = data.trainType;
                    document.getElementById('in-now').innerText = data.now;
                    document.getElementById('in-next').innerText = data.next;

                    const trans = document.getElementById('transfer');
                    if(data.transfer) { trans.innerText = "お乗り換え： " + data.transfer; trans.style.display = 'block'; }
                    else { trans.style.display = 'none'; }
                }
                if(data.type === 'door') {
                    const c = document.getElementById('door-container');
                    const m = document.getElementById('door-msg');
                    if(data.status === 'open') {
                        c.classList.add('door-open');
                        m.innerText = (data.side==='left'?'左':'右') + "側のドアが開きます";
                        m.style.color = "var(--th-orange)";
                    } else {
                        c.classList.remove('door-open');
                        m.innerText = "ドアが閉まります";
                        m.style.color = "#000";
                    }
                }
                if(data.type === 'ticker') {
                    document.getElementById('ticker-text').innerText = data.text;
                }
                if(data.type === 'cut') {
                    document.getElementById('cut-badge').style.display = data.active ? 'block' : 'none';
                }
            });
        });

        function animateMaku(id, text) {
            const el = document.getElementById(id); if(el.innerText === text) return;
            el.style.transform = 'translateY(-100%)';
            setTimeout(() => { el.style.transition = 'none'; el.style.transform = 'translateY(100%)'; el.innerText = text;
                setTimeout(() => { el.style.transition = ''; el.style.transform = 'translateY(0)'; }, 50);
            }, 300);
        }

        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; }); });
        function initAudio() { document.getElementById('remote-audio').play(); }
        function setScale() { document.getElementById('scaler').style.transform = `scale(${Math.min(window.innerWidth/1300, window.innerHeight/900)})`; }
        window.onresize = setScale; setScale();
    </script>
</body>
</html>
