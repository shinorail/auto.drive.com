<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>館浜電鉄 案内表示システム</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --th-green: #2ecc71; --black: #000; --gray: #666; }
        body { background-color: #333; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #scale-wrapper { width: 1326px; height: 746px; transform-origin: center; background: #fff; position: relative; border: 5px solid #000; }
        
        /* ヘッダーデザイン */
        header { height: 140px; border-bottom: 4px solid #000; display: flex; align-items: center; padding: 0 30px; position: relative; }
        .header-type { font-size: 40px; font-weight: bold; border: 4px solid #000; padding: 5px 20px; margin-right: 20px; }
        .header-dest { font-size: 40px; font-weight: bold; margin-right: 20px; }
        .header-line { font-size: 30px; color: var(--th-green); font-weight: bold; border-right: 2px solid #ccc; padding-right: 20px; }
        .header-st { font-size: 85px; font-weight: bold; margin-left: 40px; }
        .header-clock { position: absolute; right: 30px; top: 20px; font-size: 35px; font-weight: bold; }

        /* QRコード初期表示 */
        #setup-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode { padding: 20px; background: #fff; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="scale-wrapper">
        <div id="setup-overlay">
            <h2>スマホを接続してください</h2>
            <div id="qrcode"></div>
            <p id="peer-id-display">Connecting to network...</p>
        </div>

        <header>
            <div class="header-type" id="display-type">普通</div>
            <div class="header-dest" id="display-dest">新井川 ゆき</div>
            <div class="header-line" id="display-line">館濱線</div>
            <div class="header-st" id="st-name-main">館浜</div>
            <div class="header-clock" id="clock">00:00</div>
        </header>
        <div style="padding: 100px; text-align: center; font-size: 40px; color: #ccc;">運行中...</div>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        function setScale() {
            const scale = Math.min(window.innerWidth / 1326, window.innerHeight / 746);
            document.getElementById('scale-wrapper').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', setScale); setScale();

        // 毎回ユニークなIDを生成して衝突を防ぐ
        const ID = "TATEHAMA-" + Math.floor(Math.random() * 9000 + 1000);
        const peer = new Peer(ID);

        peer.on('open', (id) => {
            document.getElementById('peer-id-display').innerText = "ID: " + id;
            const conUrl = window.location.href.replace('index.html', 'con.html') + "?id=" + id;
            new QRCode(document.getElementById("qrcode"), { text: conUrl, width: 250, height: 250 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('setup-overlay').style.display = 'none'; // 接続されたら消す
            conn.on('data', (data) => {
                if(data.type === 'station') document.getElementById('st-name-main').innerText = data.val;
                if(data.type === 'type') document.getElementById('display-type').innerText = data.val;
                if(data.type === 'dest') document.getElementById('display-dest').innerText = data.val + " ゆき";
                if(data.type === 'line') document.getElementById('display-line').innerText = data.val;
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; });
        });

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
