<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 総合表示システム 極 V8.5 完全版</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --th-green: #2ecc71; --th-red: #ff3b30; --th-orange: #e67e22; --th-blue: #2980b9; --th-light: #f2f2f2; }
        body { background: #000; margin: 0; color: #fff; font-family: "Helvetica Neue", Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 850px; display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s; }
        
        /* 外部幕：物理回転アニメーション */
        .external-maku { background: #000; border: 8px solid #444; border-radius: 12px; height: 160px; display: flex; align-items: center; padding: 0 30px; box-shadow: inset 0 0 20px #000; }
        .maku-box, .dest-box { height: 95px; overflow: hidden; border: 3px solid #fff; background: #000; position: relative; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .maku-box { min-width: 260px; margin-right: 25px; }
        .dest-box { flex-grow: 1; }
        .rolling-text { position: absolute; width: 100%; font-size: 80px; font-weight: bold; line-height: 95px; top: 0; left: 0; text-align: center; color: #fff; text-shadow: 2px 2px 4px #000; }
        
        .roll-anim { animation: maku-roll 0.7s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        @keyframes maku-roll {
            0% { transform: translateY(-100%); filter: blur(2px); }
            40% { filter: blur(8px); }
            50% { transform: translateY(100%); }
            51% { transform: translateY(-100%); }
            100% { transform: translateY(0); filter: blur(0px); }
        }

        /* 内部LCD */
        .internal-lcd { background: #fff; color: #000; flex-grow: 1; border: 6px solid #333; display: flex; overflow: hidden; position: relative; border-radius: 4px; }
        .lcd-main { flex: 7; padding: 30px; display: flex; flex-direction: column; border-right: 6px solid #000; position: relative; }
        header { border-bottom: 6px solid #000; display: flex; align-items: center; padding-bottom: 15px; margin-bottom: 20px; }
        .lcd-bound { font-size: 28px; font-weight: bold; background: #000; color: #fff; padding: 8px 18px; margin-right: 25px; border-radius: 4px; }
        .lcd-type { font-size: 45px; font-weight: bold; border: 5px solid #000; padding: 0 20px; border-radius: 2px; }
        .lcd-now-st { font-size: 58px; font-weight: bold; flex-grow: 1; text-align: right; }
        
        .next-st { font-size: 160px; font-weight: bold; text-align: center; margin: 15px 0; letter-spacing: -6px; line-height: 1; }
        .transfer-box { background: var(--th-light); padding: 20px; border-radius: 12px; margin-top: 15px; font-weight: bold; font-size: 26px; display: none; border-left: 12px solid var(--th-blue); }

        /* 緊急SOS・回送表示 */
        #emergency-overlay { position: absolute; inset: 0; background: rgba(220,0,0,0.95); z-index: 99; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .alarm-text { font-size: 130px; font-weight: bold; color: #fff; animation: flash 0.4s infinite; }
        #not-service-ui { display: none; text-align: center; padding-top: 80px; }

        /* ドアギミック */
        .door-info-area { margin-top: auto; padding: 25px; background: var(--th-light); border-radius: 20px; text-align: center; border: 2px solid #ddd; }
        #door-msg { font-size: 32px; font-weight: bold; height: 40px; margin-bottom: 20px; transition: color 0.3s; }
        .door-visual { width: 400px; height: 130px; background: #777; margin: 0 auto; position: relative; border: 6px solid #333; overflow: hidden; border-radius: 5px; }
        .door-leaf { width: 50%; height: 100%; background: linear-gradient(90deg, #999, #eee, #999); border: 1px solid #555; position: absolute; top: 0; transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1); }
        .door-l { left: 0; border-right: 2px solid #666; } .door-r { right: 0; border-left: 2px solid #666; }
        .door-open .door-l { transform: translateX(-96%); }
        .door-open .door-r { transform: translateX(96%); }
        #cut-badge { position: absolute; top: 25px; right: 25px; background: var(--th-red); color: #fff; padding: 12px 24px; border-radius: 10px; font-weight: bold; font-size: 24px; display: none; animation: flash 0.8s infinite; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 広告・テロップ */
        .lcd-ad { flex: 3; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        #ad-screen { flex: 1; background: #fff; position: relative; }
        #ad-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.7s ease-in-out; }
        .info-ticker { height: 75px; background: #1a1a1a; color: #fff; overflow: hidden; position: relative; border-top: 7px solid var(--th-orange); }
        #ticker-text { position: absolute; white-space: nowrap; font-size: 30px; font-weight: bold; line-height: 70px; will-change: transform; }

        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes scroll { from { transform: translateX(1280px); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div id="scaler">
        <div class="external-maku">
            <div class="maku-box"><div id="ext-type" class="rolling-text">---</div></div>
            <div class="dest-box"><div id="ext-dest" class="rolling-text">---</div></div>
        </div>
        <div class="internal-lcd">
            <div id="qr-overlay"><div id="qrcode" onclick="startSystem()"></div><p style="font-weight:bold; margin-top:20px;">画面クリックでシステム起動</p></div>
            <div id="emergency-overlay"><div class="alarm-text">SOS<br>緊急停止</div><p style="font-size:30px; color:#fff; font-weight:bold;">急停車します。つり革にお掴まりください。</p></div>
            
            <div class="lcd-main">
                <div id="cut-badge">3/4 締切中</div>
                <header>
                    <div class="lcd-bound" id="in-bound">---方面</div>
                    <div class="lcd-type" id="in-type">---</div>
                    <div class="lcd-now-st" id="in-now">---</div>
                </header>
                
                <div id="normal-ui">
                    <div style="font-size:30px; color:#777; font-weight:bold;">次は Next</div>
                    <div class="next-st" id="in-next">---</div>
                    <div id="transfer" class="transfer-box"></div>
                </div>

                <div id="not-service-ui">
                    <div style="font-size:100px; font-weight:bold; color:var(--th-red);">回 送</div>
                    <div style="font-size:40px; font-weight:bold; color:#888;">Not In Service</div>
                </div>

                <div class="door-info-area">
                    <div id="door-msg">ドアが閉まります</div>
                    <div id="door-container" class="door-visual"><div class="door-leaf door-l"></div><div class="door-leaf door-r"></div></div>
                </div>
            </div>

            <div class="lcd-ad">
                <div id="ad-screen"><img id="ad-img" src="img/kakekomi.jpg"></div>
                <div class="info-ticker"><div id="ticker-text">館浜電鉄をご利用くださいましてありがとうございます。</div></div>
            </div>
        </div>
    </div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        const peer = new Peer();
        const adImages = ["img/kakekomi.jpg", "img/seaside.jpg", "img/wasuremono.jpg"];
        let adIdx = 0;

        function startSystem() {
            document.getElementById('remote-audio').play();
            document.getElementById('qr-overlay').style.display = 'none';
        }

        // 広告ローテーション
        setInterval(() => {
            const img = document.getElementById('ad-img');
            img.style.opacity = 0;
            setTimeout(() => {
                adIdx = (adIdx + 1) % adImages.length;
                img.src = adImages[adIdx];
                img.onload = () => img.style.opacity = 1;
            }, 700);
        }, 12000);

        peer.on('open', (id) => {
            const url = window.location.href.split('?')[0].replace('index.html','') + `con.html?id=${id}`;
            new QRCode(document.getElementById("qrcode"), { text: url, width: 250, height: 250 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'update') {
                    const isNS = (data.trainType === '回送' || data.trainType === '試運転');
                    document.getElementById('normal-ui').style.display = isNS ? 'none' : 'block';
                    document.getElementById('not-service-ui').style.display = isNS ? 'block' : 'none';

                    triggerMaku('ext-type', data.trainType);
                    triggerMaku('ext-dest', isNS ? "" : data.dest + " 行");

                    document.getElementById('in-bound').innerText = data.bound + "方面";
                    document.getElementById('in-type').innerText = data.trainType;
                    document.getElementById('in-now').innerText = data.now;
                    document.getElementById('in-next').innerText = data.next;
                    
                    const t = document.getElementById('transfer');
                    if(data.transfer) { t.innerText = "お乗り換え： " + data.transfer; t.style.display = 'block'; }
                    else { t.style.display = 'none'; }
                }
                if(data.type === 'door') {
                    const c = document.getElementById('door-container');
                    const m = document.getElementById('door-msg');
                    if(data.status === 'open') {
                        c.classList.add('door-open');
                        m.innerText = (data.side==='left'?'左':'右') + "側のドアが開きます";
                        m.style.color = "var(--th-orange)";
                    } else {
                        c.classList.remove('door-open');
                        m.innerText = "ドアが閉まります";
                        m.style.color = "#000";
                    }
                }
                if(data.type === 'ticker') {
                    const el = document.getElementById('ticker-text');
                    el.style.animation = 'none';
                    el.innerText = data.text;
                    const duration = (el.offsetWidth + 1280) / 140;
                    el.style.animation = `scroll ${duration}s linear infinite`;
                }
                if(data.type === 'cut') document.getElementById('cut-badge').style.display = data.active ? 'block' : 'none';
                if(data.type === 'emergency') document.getElementById('emergency-overlay').style.display = data.active ? 'flex' : 'none';
            });
        });

        function triggerMaku(id, text) {
            const el = document.getElementById(id);
            if(el.innerText === text) return;
            el.classList.remove('roll-anim');
            void el.offsetWidth;
            el.classList.add('roll-anim');
            setTimeout(() => { el.innerText = text; }, 350);
        }

        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; }); });
        function setScale() { document.getElementById('scaler').style.transform = `scale(${Math.min(window.innerWidth/1300, window.innerHeight/900)})`; }
        window.onresize = setScale; setScale();
    </script>
</body>
</html>
