<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 表示システム</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #1a1a1a; margin: 0; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 850px; display: flex; flex-direction: column; gap: 15px; transform-origin: center; }
        .external-maku { background: #000; border: 8px solid #444; border-radius: 10px; height: 180px; display: flex; align-items: center; padding: 0 40px; overflow: hidden; }
        .maku-box { height: 100px; overflow: hidden; position: relative; border: 3px solid #fff; margin-right: 30px; min-width: 220px; text-align: center; }
        .dest-box { height: 100px; overflow: hidden; position: relative; flex-grow: 1; }
        .rolling-text { font-size: 70px; font-weight: bold; line-height: 100px; color: #fff; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .blur { filter: blur(3px); opacity: 0.7; }
        .internal-lcd { background: #fff; color: #000; flex-grow: 1; border: 5px solid #000; position: relative; padding: 30px 50px; }
        header { border-bottom: 5px solid #000; display: flex; align-items: center; padding-bottom: 15px; margin-bottom: 20px; }
        .lcd-bound { font-size: 30px; font-weight: bold; background: #000; color: #fff; padding: 5px 15px; margin-right: 20px; }
        .lcd-type { font-size: 40px; font-weight: bold; border: 4px solid #000; padding: 2px 15px; margin-right: 20px; }
        .lcd-now-st { font-size: 60px; font-weight: bold; flex-grow: 1; text-align: right; }
        .next-st { font-size: 160px; font-weight: bold; text-align: center; margin-top: 10px; }
        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
    </style>
</head>
<body>
    <div id="scaler">
        <div class="external-maku">
            <div class="maku-box"><div id="ext-type" class="rolling-text">---</div></div>
            <div class="dest-box"><div id="ext-dest" class="rolling-text">---</div></div>
        </div>
        <div class="internal-lcd">
            <div id="qr-overlay">
                <h1 onclick="startSystem()">ここをクリックして開始</h1>
                <div id="qrcode"></div>
                <p>スマホでスキャンしてください</p>
            </div>
            <header>
                <div class="lcd-bound" id="in-bound">---方面</div>
                <div class="lcd-type" id="in-type">---</div>
                <div class="lcd-now-st" id="in-now">---</div>
            </header>
            <main>
                <div style="font-size:30px; color:#666; font-weight:bold;">次は Next</div>
                <div class="next-st" id="in-next">---</div>
            </main>
        </div>
    </div>
    <audio id="remote-audio" autoplay playsinline></audio>
    <script>
        const peer = new Peer();
        function startSystem() { document.getElementById('remote-audio').play().catch(()=>{}); }
        peer.on('open', (id) => {
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            const conUrl = `${baseUrl}/con.html?id=${id}`;
            new QRCode(document.getElementById("qrcode"), { text: conUrl, width: 250, height: 250 });
        });
        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'update') {
                    animateMaku('ext-type', data.trainType);
                    animateMaku('ext-dest', data.dest + " 行");
                    document.getElementById('in-bound').innerText = data.bound + "方面";
                    document.getElementById('in-type').innerText = data.trainType;
                    document.getElementById('in-now').innerText = data.now;
                    document.getElementById('in-next').innerText = data.next;
                }
            });
        });
        function animateMaku(id, text) {
            const el = document.getElementById(id);
            if(el.innerText === text) return;
            el.classList.add('blur'); el.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                el.style.transition = 'none'; el.style.transform = 'translateY(100%)'; el.innerText = text;
                setTimeout(() => { el.style.transition = ''; el.style.transform = 'translateY(0)'; el.classList.remove('blur'); }, 50);
            }, 300);
        }
        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; }); });
        function setScale() { const s = Math.min(window.innerWidth / 1300, window.innerHeight / 900); document.getElementById('scaler').style.transform = `scale(${s})`; }
        window.onresize = setScale; setScale();
    </script>
</body>
</html>
