<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>館浜電鉄 案内表示システム</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --accent: #ffcc00; --text: #fff; --danger: #ff3b30; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        #st-name { font-size: 12vw; font-weight: bold; border-bottom: 12px solid var(--accent); padding-bottom: 10px; width: 90%; text-align: center; letter-spacing: 0.1em; }
        #status-msg { font-size: 5vw; color: var(--danger); margin-top: 40px; height: 1.5em; font-weight: bold; text-shadow: 0 0 10px rgba(255, 59, 48, 0.5); }
        #qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        #qrcode { background: #fff; padding: 20px; border-radius: 15px; }
        .qr-text { margin-top: 20px; font-size: 18px; color: var(--accent); font-weight: bold; }
        #conn-stat { position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #444; }
    </style>
</head>
<body onclick="enableAudio()"> <div id="st-name">案内準備中</div>
    <div id="status-msg"></div>
    <div id="conn-stat">OFFLINE</div>

    <div id="qr-overlay">
        <div id="qrcode"></div>
        <p class="qr-text">スキャンして接続</p>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        const pairID = "TH-" + Math.random().toString(36).substring(2, 8).toUpperCase();
        const peer = new Peer(pairID);

        // 音声再生を許可するための関数
        function enableAudio() {
            const audio = document.getElementById('remote-audio');
            audio.play().then(() => {
                audio.pause();
                console.log("Audio Enabled");
            }).catch(e => console.log("Waiting for user interaction"));
        }

        peer.on('open', (id) => {
            document.getElementById('conn-stat').innerText = "ID: " + id;
            const currentUrl = window.location.href.split('?')[0];
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            const targetUrl = `${baseUrl}/con.html?id=${id}`;
            new QRCode(document.getElementById("qrcode"), { text: targetUrl, width: 200, height: 200 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            document.getElementById('conn-stat').innerText = "CONNECTED";
            document.getElementById('conn-stat').style.color = "#28a745";

            conn.on('data', (data) => {
                if(data.type === 'station') {
                    document.getElementById('st-name').innerText = "次 は " + data.val;
                }
                if(data.type === 'cmd') {
                    const msgArea = document.getElementById('status-msg');
                    msgArea.innerText = data.val;
                    setTimeout(() => { if(msgArea.innerText === data.val) msgArea.innerText = ""; }, 4000);
                }
            });
        });

        // 🎤 音声受信部分（ここを強化）
        peer.on('call', (call) => {
            console.log("受信中...");
            document.getElementById('status-msg').innerText = "🎤 放送中...";
            
            call.answer(); 
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = remoteStream;
                // 再生に失敗した場合は、ユーザーにクリックを促す
                audio.play().catch(e => {
                    document.getElementById('status-msg').innerText = "⚠️ 画面をクリックして下さい";
                });
            });

            call.on('close', () => {
                document.getElementById('status-msg').innerText = "";
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
