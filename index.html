<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 案内表示 (PC)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --th-green: #2ecc71; }
        body { background: #000; margin: 0; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 720px; background: #fff; color: #000; position: relative; transform-origin: center; border: 4px solid #000; }
        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        header { height: 150px; border-bottom: 5px solid #000; display: flex; align-items: center; padding: 0 40px; }
        .type-box { font-size: 50px; font-weight: bold; border: 5px solid #000; padding: 10px 30px; margin-right: 30px; }
        .st-now { font-size: 100px; font-weight: bold; flex-grow: 1; text-align: right; }
        main { padding: 60px; }
        .next-label { font-size: 40px; font-weight: bold; color: #666; }
        .next-st { font-size: 180px; font-weight: bold; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="scaler">
        <div id="qr-overlay">
            <h1 id="status-text">通信サーバーに接続中...</h1>
            <div id="qrcode"></div>
        </div>
        <header>
            <div class="type-box" id="disp-type">普通</div>
            <div class="st-now" id="disp-now">館浜</div>
        </header>
        <main>
            <div class="next-label">次は Next</div>
            <div class="next-st" id="disp-next">---</div>
        </main>
    </div>
    <audio id="remote-audio" autoplay playsinline></audio>
    <script>
        function setScale() {
            const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
            document.getElementById('scaler').style.transform = `scale(${s})`;
        }
        window.onresize = setScale; setScale();

        // 毎回違うIDを作ることで接続を高速化
        const peer = new Peer(); 

        peer.on('open', (id) => {
            document.getElementById('status-text').innerText = "スマホでスキャンしてください";
            const conUrl = window.location.href.replace('index.html', 'con.html') + "?id=" + id;
            new QRCode(document.getElementById("qrcode"), { text: conUrl, width: 300, height: 300 });
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'station') {
                    document.getElementById('disp-now').innerText = data.now;
                    document.getElementById('disp-next').innerText = data.next;
                }
                if(data.type === 'type') document.getElementById('disp-type').innerText = data.val;
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; });
        });
    </script>
</body>
</html>
