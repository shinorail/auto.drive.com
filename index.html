<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 案内表示システム</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #st-name { font-size: 10vw; font-weight: bold; border-bottom: 8px solid #ffcc00; padding-bottom: 20px; width: 85%; text-align: center; }
        #qr-area { position: fixed; top: 20px; right: 20px; background: #fff; padding: 10px; border-radius: 10px; text-align: center; }
        #qr-area p { color: #000; margin: 5px 0 0; font-size: 12px; font-weight: bold; }
        #status-msg { font-size: 4vw; color: #ff3b30; margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="st-name">接続待機中</div>
    <div id="status-msg"></div>
    <div id="qr-area">
        <div id="qrcode"></div>
        <p>スマホでスキャン</p>
    </div>
    <audio id="remote-audio" autoplay></audio>

    <script>
        // ランダムなIDを生成（これがペアリングキーになります）
        const pairID = "TH-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        const peer = new Peer(pairID);

        peer.on('open', id => {
            // 現在のURLにパラメータを付けてQRコード化
            const url = window.location.href.split('?')[0].replace('index.html', '') + "con.html?id=" + id;
            new QRCode(document.getElementById("qrcode"), { text: url, width: 128, height: 128 });
        });

        peer.on('connection', conn => {
            document.getElementById('st-name').innerText = "案内準備中";
            document.getElementById('qr-area').style.display = 'none';
            conn.on('data', data => {
                if(data.type === 'station') document.getElementById('st-name').innerText = "次 は " + data.val;
                if(data.type === 'cmd') {
                    document.getElementById('status-msg').innerText = data.val;
                    setTimeout(() => document.getElementById('status-msg').innerText = "", 4000);
                }
            });
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', s => document.getElementById('remote-audio').srcObject = s);
        });
    </script>
</body>
</html>
