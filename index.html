<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>館浜電鉄 車内表示システム V17</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --th-red: #ff3b30; --th-orange: #e67e22; --th-blue: #007aff; --th-light: #f2f2f2; }
        body { background: #000; margin: 0; color: #fff; font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #scaler { width: 1280px; height: 850px; display: flex; flex-direction: column; gap: 15px; transform-origin: center; position: relative; }
        
        /* 外部幕（パタパタ） */
        .external-maku { background: #111; border: 8px solid #444; border-radius: 12px; height: 160px; display: flex; align-items: center; padding: 0 30px; }
        .flap { height: 100px; background: #000; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        .flap-type { width: 280px; margin-right: 25px; font-size: 70px; }
        .flap-dest { flex-grow: 1; font-size: 80px; }
        .flip-anim { animation: flip 0.6s ease-in-out; }
        @keyframes flip { 0%, 100% { transform: rotateX(0); } 50% { transform: rotateX(90deg); opacity: 0.4; } }

        /* 車内LCD */
        .internal-lcd { background: #fff; color: #000; flex-grow: 1; border: 6px solid #333; display: flex; overflow: hidden; position: relative; }
        .lcd-main { flex: 7; padding: 25px; display: flex; flex-direction: column; border-right: 6px solid #000; }
        header { border-bottom: 6px solid #000; display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 10px; }
        .lcd-type { font-size: 45px; font-weight: bold; border: 5px solid #000; padding: 0 20px; margin-right: 20px; }
        .lcd-bound { font-size: 26px; font-weight: bold; background: #000; color: #fff; padding: 5px 15px; }
        .clock { margin-left: auto; font-size: 35px; font-weight: bold; font-family: monospace; }

        .next-st-name { font-size: 160px; font-weight: bold; text-align: center; flex-grow: 1; line-height: 1.1; letter-spacing: -5px; }
        .transfer-box { height: 50px; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #555; visibility: hidden; }
        .show-trans { visibility: visible; }

        .info-area { height: 210px; background: var(--th-light); border-radius: 15px; padding: 15px; position: relative; border: 2px solid #ccc; overflow: hidden; }
        #status-text { font-size: 38px; font-weight: bold; white-space: nowrap; position: absolute; top: 20px; }
        .ticker { animation: scroll var(--speed, 12s) linear infinite; }
        @keyframes scroll { from { transform: translateX(950px); } to { transform: translateX(-100%); } }

        .door-visual { width: 400px; height: 100px; background: #333; margin: 55px auto 0; position: relative; border: 4px solid #333; }
        .door-leaf { width: 50%; height: 100%; background: linear-gradient(90deg, #aaa, #eee, #aaa); position: absolute; transition: 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .door-open .door-l { transform: translateX(-96%); } .door-open .door-r { transform: translateX(96%); }

        /* 広告・特殊 */
        .lcd-ad { flex: 3; background: #222; position: relative; overflow: hidden; }
        #ad-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 1s; }
        #cut-badge { position: absolute; top: 15px; right: 15px; background: var(--th-red); color: #fff; padding: 12px; font-weight: bold; border-radius: 5px; display: none; }
        #sos-overlay { position: absolute; inset: 0; background: red; z-index: 100; display: none; align-items: center; justify-content: center; font-size: 120px; font-weight: bold; }
        #overlay { position: absolute; inset: 0; background: #fff; z-index: 101; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="scaler">
        <div class="external-maku">
            <div id="f-type" class="flap flap-type">---</div>
            <div id="f-dest" class="flap flap-dest">---</div>
        </div>
        <div class="internal-lcd">
            <div id="overlay">【館浜電鉄】タップして乗務開始</div>
            <div id="sos-overlay">SOS 急停車</div>
            <div class="lcd-main">
                <header>
                    <div class="lcd-type" id="in-type">---</div>
                    <div class="lcd-bound" id="in-bound">---方面</div>
                    <div class="clock" id="live-clock">00:00:00</div>
                </header>
                <div class="next-label" style="font-size:30px; color:#777; font-weight:bold; text-align:center;">次は Next</div>
                <div class="next-st-name" id="in-next">---</div>
                <div class="transfer-box" id="trans-info">🔄 乗り換え：自営R線</div>
                <div class="info-area">
                    <div id="status-text">館浜電鉄をご利用いただきありがとうございます。</div>
                    <div id="door-box" class="door-visual"><div class="door-leaf door-l" style="left:0;"></div><div class="door-leaf door-r" style="right:0;"></div></div>
                </div>
            </div>
            <div class="lcd-ad">
                <div id="cut-badge">3/4 締切</div>
                <img id="ad-img" src="img/kakekomi.jpg">
            </div>
        </div>
    </div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        const MY_ID = "tannihama-master-node"; // 指令側と共通
        const peer = new Peer(MY_ID);
        let currentMsg = "館浜電鉄をご利用いただきありがとうございます。";
        const ads = ["img/kakekomi.jpg", "img/seaside.jpg", "img/wasuremono.jpg"];
        let adIdx = 0;

        function updateClock() { document.getElementById('live-clock').innerText = new Date().toTimeString().split(' ')[0]; }
        setInterval(updateClock, 1000);

        document.getElementById('overlay').onclick = function() {
            this.style.display = 'none';
            document.getElementById('remote-audio').play().catch(()=>{});
            setInterval(() => {
                adIdx = (adIdx + 1) % ads.length;
                const img = document.getElementById('ad-img');
                img.style.opacity = 0;
                setTimeout(() => { img.src = ads[adIdx]; img.style.opacity = 1; }, 1000);
            }, 15000);
        };

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.type === 'update') {
                    updateFlap('f-type', data.trainType);
                    const isSvc = (data.trainType !== '回送' && data.trainType !== '試運転');
                    updateFlap('f-dest', isSvc ? data.dest + " 行" : " ");
                    document.getElementById('in-type').innerText = data.trainType;
                    document.getElementById('in-bound').innerText = isSvc ? data.bound + "方面" : "不定期";
                    
                    const nextEl = document.getElementById('in-next');
                    if(data.trainType==='回送') nextEl.innerText = "回送";
                    else if(data.trainType==='試運転') nextEl.innerText = "試運転";
                    else nextEl.innerText = data.next;

                    const trans = document.getElementById('trans-info');
                    if(isSvc && (data.now === '浜園' || data.now === '館浜' || data.next === '浜園' || data.next === '館浜')) {
                        trans.classList.add('show-trans');
                    } else { trans.classList.remove('show-trans'); }
                }
                if(data.type === 'door') {
                    const db = document.getElementById('door-box');
                    const st = document.getElementById('status-text');
                    if(data.status === 'open') {
                        db.classList.add('door-open');
                        st.innerText = (data.side==='left'?'左':'右') + "側のドアが開きます";
                        st.classList.remove('ticker');
                    } else {
                        db.classList.remove('door-open');
                        st.innerText = currentMsg;
                        if(currentMsg.length > 15) st.classList.add('ticker');
                    }
                }
                if(data.type === 'ticker') {
                    currentMsg = data.text;
                    const st = document.getElementById('status-text');
                    st.innerText = currentMsg;
                    if(currentMsg.length > 15) st.classList.add('ticker'); else st.classList.remove('ticker');
                }
                if(data.type === 'sos') document.getElementById('sos-overlay').style.display = data.active ? 'flex' : 'none';
                if(data.type === 'cut') document.getElementById('cut-badge').style.display = data.active ? 'block' : 'none';
            });
        });

        function updateFlap(id, txt) {
            const el = document.getElementById(id);
            if(el.innerText === txt) return;
            el.classList.remove('flip-anim'); void el.offsetWidth; el.classList.add('flip-anim');
            setTimeout(() => el.innerText = txt, 300);
        }

        peer.on('call', (call) => { call.answer(); call.on('stream', (s) => { document.getElementById('remote-audio').srcObject = s; }); });
        function setScale() { document.getElementById('scaler').style.transform = `scale(${Math.min(window.innerWidth/1300, window.innerHeight/900)})`; }
        window.onresize = setScale; setScale();
    </script>
</body>
</html>
