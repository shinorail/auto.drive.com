<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>館浜電鉄 運行表示システム (PC用)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #scaler { width: 1280px; height: 720px; background: #000; position: relative; color: white; transform-origin: center; }
        #qr-overlay { position: absolute; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        .container { padding: 80px 60px; }
        .label { font-size: 80px; font-weight: bold; color: #ccc; }
        .station { font-size: 200px; font-weight: bold; text-align: center; width: 100%; display: block; margin-top: 40px; }
        .line { position: absolute; bottom: 80px; left: 5%; width: 90%; height: 12px; background: #ffcc00; }
    </style>
</head>
<body>
    <div id="scaler">
        <div id="qr-overlay">
            <h2 id="msg">スマホでQRコードをスキャンしてください</h2>
            <div id="qrcode"></div>
            <p id="peer-id-log">通信準備中...</p>
        </div>
        <div class="container">
            <div class="label">次 は</div>
            <div class="station" id="disp-next">館浜</div>
            <div class="line"></div>
        </div>
    </div>
    <script>
        function setScale() {
            const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
            document.getElementById('scaler').style.transform = `scale(${scale})`;
        }
        window.onresize = setScale; setScale();

        // PC側のIDを固定
        const peer = new Peer("TATEHAMA-PC-SIDE");

        peer.on('open', (id) => {
            // con.html へのパスを確実に作成（現在のフォルダ内の con.html を指定）
            const currentPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
            const conUrl = window.location.origin + currentPath + "/con.html?id=" + id;
            
            new QRCode(document.getElementById("qrcode"), { text: conUrl, width: 300, height: 300 });
            document.getElementById('peer-id-log').innerText = "接続待機中: " + id;
        });

        peer.on('connection', (conn) => {
            document.getElementById('qr-overlay').style.display = 'none';
            conn.on('data', (data) => {
                if(data.type === 'next') document.getElementById('disp-next').innerText = data.val;
            });
        });
    </script>
</body>
</html>
